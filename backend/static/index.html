                                Jira Backlog
                              </h4>
                              <span className="text-[10px] text-slate-500 font-bold">{jiraDemands.length} itens</span>
                            </div>

                            <div className="space-y-3">
                              {jiraDemands.length > 0 ? (
                                jiraDemands.map(demand => (
                                  <DemandProjectCard
                                    key={demand.externalId}
                                    demand={demand}
                                    onSelect={onSelectDemand}
                                  />
                                ))
                              ) : (
                                <div className="text-center py-8 border border-dashed border-slate-800/60 rounded-xl text-slate-600 text-xs">
                                  Nenhuma demanda do Jira neste projeto.
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="text-center py-20 border border-dashed border-slate-800/80 rounded-3xl text-slate-500 flex flex-col items-center justify-center gap-3">
              <Icon name="layers" className="w-12 h-12 text-slate-700" />
              <div>
                <p className="text-sm font-semibold text-slate-400">Nenhum projeto encontrado</p>
                <p className="text-xs text-slate-500 mt-1">
                  Adicione tags no formato <code className="bg-slate-900 px-1 py-0.5 rounded text-indigo-400">projeto: nome</code> ou <code className="bg-slate-900 px-1 py-0.5 rounded text-indigo-400">projeto-nome</code> nas demandas para criar grupos.
                </p>
              </div>
            </div>
          )}
        </div>
      );
    }

    function DemandProjectCard({ demand, onSelect }) {
      const isBlocker = demand.blocked_by && demand.blocked_by.length > 0;
      const isBlocked = demand.blockers && demand.blockers.length > 0;

      return (
        <div
          onClick={() => onSelect(demand.externalId)}
          className={`bg-slate-900/40 border rounded-xl p-4 space-y-3 hover:bg-slate-900/60 cursor-pointer transition-all hover:scale-[1.01] hover:border-slate-700 flex flex-col justify-between group ${
            isBlocked 
              ? 'border-rose-500/20 shadow-sm shadow-rose-950/10' 
              : isBlocker 
              ? 'border-amber-500/20 shadow-sm shadow-amber-950/10' 
              : 'border-slate-800/80'
          }`}
        >
          <div className="space-y-2">
            <div className="flex items-center justify-between gap-3">
              <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{demand.externalId}</span>
              <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full ${
                demand.externalStatus === 'Concluído' || demand.externalStatus === 'Resolved' || demand.externalStatus === 'Done'
                  ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
                  : demand.externalStatus === 'Em Progresso' || demand.externalStatus === 'Desenvolvimento' || demand.externalStatus === 'Doing'
                  ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20'
                  : 'bg-slate-800 text-slate-400 border border-slate-700/50'
              }`}>
                {demand.externalStatus}
              </span>
            </div>

            <h5 className="font-semibold text-xs text-slate-200 group-hover:text-white transition-colors leading-relaxed line-clamp-2">
              {demand.title}
            </h5>
          </div>

          {(isBlocked || isBlocker) && (
            <div className="flex flex-wrap gap-1.5 pt-1.5 border-t border-slate-800/40">
              {isBlocked && (
                <span className="inline-flex items-center gap-1 text-[9px] font-bold bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2 py-0.5 rounded-md">
                  <Icon name="alert-triangle" className="w-3 h-3 flex-shrink-0" />
                  Bloqueado por: {demand.blockers.join(', ')}
                </span>
              )}
              {isBlocker && (
                <span className="inline-flex items-center gap-1 text-[9px] font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded-md">
                  <Icon name="alert-octagon" className="w-3 h-3 flex-shrink-0" />
                  Bloqueia outros ({demand.blocked_by.length})
                </span>
              )}
            </div>
          )}
        </div>
      );
    }

    // RoadmapGraphView Component
    const nodeWidth = 200;
    const nodeHeight = 85;

    // Custom Node Component
    const DemandNode = ({ data }) => {
      const isJira = data.origin === 'Jira';
      const borderColor = isJira ? 'border-sky-500' : 'border-emerald-500';
      const badgeColor = isJira ? 'bg-sky-500/10 text-sky-400 border-sky-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';

      return (
        <div className={`p-3 bg-slate-900 border ${borderColor} rounded-xl shadow-lg w-[200px] text-xs font-sans`}>
          <Handle type="target" position={Position.Top} style={{ background: '#555' }} />
          <Handle type="target" position={Position.Left} id="left" style={{ background: '#555' }} />
          
          <div className="flex justify-between items-center mb-1">
            <span className="font-bold text-slate-400 tracking-wider uppercase text-[9px]">{data.externalId}</span>
            <span className={`px-1.5 py-0.5 rounded text-[8px] font-semibold border ${badgeColor}`}>
              {data.origin}
            </span>
          </div>
          
          <p className="font-semibold text-slate-100 truncate mb-1" title={data.title}>
            {data.title}
          </p>
          
          <div className="flex items-center justify-between text-[10px] text-slate-400">
            <span className="truncate max-w-[120px] font-semibold text-slate-300">{data.externalStatus}</span>
          </div>

          <Handle type="source" position={Position.Bottom} style={{ background: '#555' }} />
          <Handle type="source" position={Position.Right} id="right" style={{ background: '#555' }} />
        </div>
      );
    };

    const nodeTypes = {
      demandNode: DemandNode,
    };

    const getLayoutedElements = (nodes, edges, direction = 'TB') => {
      const isHorizontal = direction === 'LR';
      const dagreGraph = new dagre.graphlib.Graph();
      dagreGraph.setDefaultEdgeLabel(() => ({}));
      dagreGraph.setGraph({ rankdir: direction });

      nodes.forEach((node) => {
        dagreGraph.setNode(node.id, { width: nodeWidth, height: nodeHeight });
      });

      edges.forEach((edge) => {
        dagreGraph.setEdge(edge.source, edge.target);
      });

      dagre.layout(dagreGraph);

      nodes.forEach((node) => {
        const nodeWithPosition = dagreGraph.node(node.id);
        node.targetPosition = isHorizontal ? Position.Left : Position.Top;
        node.sourcePosition = isHorizontal ? Position.Right : Position.Bottom;

        node.position = {
          x: nodeWithPosition.x - nodeWidth / 2,
          y: nodeWithPosition.y - nodeHeight / 2,
        };
      });

      return { nodes, edges };
    };

    function RoadmapGraphView({ demands, onSelectDemand }) {
      const [nodes, setNodes, onNodesChange] = useNodesState([]);
      const [edges, setEdges, onEdgesChange] = useEdgesState([]);
      const [direction, setDirection] = useState('TB');

      useEffect(() => {
        if (!demands || demands.length === 0) {
          setNodes([]);
          setEdges([]);
          return;
        }

        // Filter out Bug and Incident / Incidente items (operational demands)
        const filteredDemands = demands.filter((d) => {
          if (!d) return false;
          const typeField = (d.type || d.issueType || d.itemType || '').toLowerCase();
          if (typeField === 'bug' || typeField === 'incident' || typeField === 'incidente') {
            return false;
          }
          if (d.title && typeof d.title === 'string') {
            const titleLower = d.title.toLowerCase();
            if (
              titleLower.startsWith('bug:') ||
              titleLower.startsWith('incidente:') ||
              titleLower.startsWith('incident:')
            ) {
              return false;
            }
          }
          return true;
        });

        // 1. Identify which demands have active parent-child or blocker/blocked relationship
        const parentIds = new Set(filteredDemands.map(d => d.parentId).filter(Boolean));
        const blockerIds = new Set();
        filteredDemands.forEach(d => {
          if (d.blockers && Array.isArray(d.blockers)) {
            d.blockers.forEach(b => blockerIds.add(b));
          }
        });

        const connectedDemands = filteredDemands.filter((d) => {
          const hasParent = !!d.parentId && filteredDemands.some(p => p.externalId === d.parentId);
          const isParent = parentIds.has(d.externalId);
          const hasBlockers = !!d.blockers && Array.isArray(d.blockers) && d.blockers.some(b => filteredDemands.some(p => p.externalId === b));
          const isBlocker = blockerIds.has(d.externalId);
          return hasParent || isParent || hasBlockers || isBlocker;
        });

        if (connectedDemands.length === 0) {
          setNodes([]);
          setEdges([]);
          return;
        }

        // 2. Create nodes
        const initialNodes = connectedDemands.map((d) => ({
          id: d.externalId,
          type: 'demandNode',
          data: {
            externalId: d.externalId,
            origin: d.origin,
            title: d.title,
            externalStatus: d.externalStatus,
          },
          position: { x: 0, y: 0 },
        }));

        // 3. Create edges (Hierarchy + Blockers)
        const initialEdges = [];

        connectedDemands.forEach((d) => {
          // Hierarchy Edge: parentId -> id
          if (d.parentId) {
            const parentExists = connectedDemands.some((p) => p.externalId === d.parentId);
            if (parentExists) {
              initialEdges.push({
                id: `h-${d.parentId}-${d.externalId}`,
                source: d.parentId,
                target: d.externalId,
                style: { stroke: '#64748b', strokeWidth: 2 },
                markerEnd: {
                  type: MarkerType.ArrowClosed,
                  color: '#64748b',
                },
              });
            }
          }

          // Blocker Edge: blockerId -> id
          if (d.blockers && Array.isArray(d.blockers)) {
            d.blockers.forEach((blockerId) => {
              const blockerExists = connectedDemands.some((b) => b.externalId === blockerId);
              if (blockerExists) {
                initialEdges.push({
                  id: `b-${blockerId}-${d.externalId}`,
                  source: blockerId,
                  target: d.externalId,
                  animated: true,
                  style: { stroke: '#ef4444', strokeWidth: 2, strokeDasharray: '5,5' },
                  markerEnd: {
                    type: MarkerType.ArrowClosed,
                    color: '#ef4444',
                  },
                });
              }
            });
          }
        });

        // 4. Compute layout
        const { nodes: layoutedNodes, edges: layoutedEdges } = getLayoutedElements(
          initialNodes,
          initialEdges,
          direction
        );

        setNodes(layoutedNodes);
        setEdges(layoutedEdges);
      }, [demands, direction]);

      const onNodeClick = (event, node) => {
        if (onSelectDemand) {
          onSelectDemand(node.id);
        }
      };

      return (
        <div className="flex-1 flex flex-col h-full bg-slate-950 text-slate-100 overflow-hidden relative">
          <div className="px-8 py-6 border-b border-slate-900 flex items-center justify-between z-10 bg-slate-950/80 backdrop-blur-md">
            <div>
              <h2 className="text-2xl font-bold text-white tracking-tight flex items-center gap-2">
                <Icon name="network" className="w-6 h-6 text-indigo-400" /> Mapa do Roadmap
              </h2>
              <p className="text-sm text-slate-400">Relações de hierarquia (cinza) e bloqueios ativos (vermelho animado)</p>
            </div>
            
            <div className="flex items-center gap-2 bg-slate-900 p-1 rounded-xl border border-slate-800">
              <button
                onClick={() => setDirection('TB')}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                  direction === 'TB' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'
                }`}
              >
                Vertical (Árvore)
              </button>
              <button
                onClick={() => setDirection('LR')}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                  direction === 'LR' ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white'
                }`}
              >
                Horizontal
              </button>
            </div>
          </div>

          <div className="flex-1 w-full h-full relative min-h-[500px]">
            {!demands || demands.length === 0 ? (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-500 gap-2">
                <Icon name="refresh-cw" className="w-8 h-8 animate-spin text-indigo-400" />
                Carregando mapa de dependências...
              </div>
            ) : nodes.length > 0 ? (
              <ReactFlowComponent
                nodes={nodes}
                edges={edges}
                onNodesChange={onNodesChange}
                onEdgesChange={onEdgesChange}
                nodeTypes={nodeTypes}
                onNodeClick={onNodeClick}
                fitView
                className="w-full h-full"
              >
                <Background color="#1e293b" gap={16} size={1} />
                <Controls className="react-flow__controls bg-slate-900 border border-slate-800 text-slate-400 fill-slate-400 rounded-lg p-1 [&>button]:border-slate-800 hover:[&>button]:bg-slate-800 hover:[&>button]:text-white" />
              </ReactFlowComponent>
            ) : (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
                <div className="w-16 h-16 bg-slate-900/40 border border-slate-800/80 rounded-2xl flex items-center justify-center text-slate-400 mb-4">
                  <Icon name="network" className="w-8 h-8 text-indigo-400" />
                </div>
                <h3 className="text-lg font-bold text-white mb-2">Nenhum vínculo estabelecido</h3>
                <p className="text-sm text-slate-400 max-w-md">
                  O Mapa do Roadmap está vazio porque não existem dependências manuais ativas. 
                  Vincule um Item Pai ou adicione Bloqueadores no painel de detalhes de qualquer demanda para vê-las aqui.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Componente HistoryView
    function HistoryView({ onSelectDemand }) {
      const [demands, setDemands] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetchHistory();
      }, []);

      const fetchHistory = async () => {
        setLoading(true);
        try {
          const res = await fetch('/api/demands/history');
          if (res.ok) {
            const data = await res.json();
            setDemands(data);
          }
        } catch (e) {
          console.error("Erro ao carregar histórico:", e);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="flex-1 overflow-y-auto px-8 py-6 max-w-7xl mx-auto w-full space-y-6">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-2xl font-bold text-white tracking-tight flex items-center gap-2.5">
                <Icon name="history" className="w-6 h-6 text-indigo-400" /> Histórico de Demandas
              </h2>
              <p className="text-sm text-slate-400">Arquivo de demandas concluídas, resolvidas ou canceladas</p>
            </div>
          </div>

          {loading ? (
            <div className="flex flex-col items-center justify-center py-20 text-slate-500 gap-2">
              <Icon name="refresh-cw" className="w-8 h-8 animate-spin text-indigo-400" />
              <span>Carregando histórico...</span>
            </div>
          ) : demands.length > 0 ? (
            <DemandTable demands={demands} onSelectDemand={onSelectDemand} />
          ) : (
            <div className="bg-slate-900/20 border border-slate-800/80 rounded-2xl p-12 text-center text-slate-500 max-w-lg mx-auto">
              <Icon name="inbox" className="w-12 h-12 mx-auto text-slate-700 mb-3" />
              <p className="font-medium text-slate-400 text-sm">Histórico vazio</p>
              <p className="text-xs mt-1">Nenhuma demanda finalizada arquivada no banco de histórico ainda.</p>
            </div>
          )}
        </div>
      );
    }

    // Componente Container da App
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [demands, setDemands] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      const [selectedDemandId, setSelectedDemandId] = useState(null);
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [lastSyncStatus, setLastSyncStatus] = useState(null);

      useEffect(() => {
        loadDemands();
        // Recupera status da última sincronização do localStorage
        const savedSync = localStorage.getItem('po-hub-last-sync');
        if (savedSync) {
          setLastSyncStatus(JSON.parse(savedSync));
        }
      }, []);

      const loadDemands = async () => {
        try {
          const res = await fetch('/api/demands');
          if (res.ok) {
            const data = await res.json();
            setDemands(data);
          }
        } catch (e) {
          console.error("Erro ao carregar demandas:", e);
        }
      };

      const handleSync = async () => {
        setIsSyncing(true);
        try {
          const res = await fetch('/api/sync', { method: 'POST' });
          if (res.ok) {
            const result = await res.json();
            await loadDemands();
            
            const syncSourceMsg = (result.sources.jira === 'real' || result.sources.azure === 'real')
              ? 'Conectado a APIs Reais'
              : 'Sincronizado com dados Mockados';

            const syncInfo = {
              time: new Date().toLocaleTimeString('pt-BR'),
              source: syncSourceMsg
            };
            
            setLastSyncStatus(syncInfo);
            localStorage.setItem('po-hub-last-sync', JSON.stringify(syncInfo));
          }
        } catch (e) {
          console.error("Erro na sincronização:", e);
        } finally {
          setIsSyncing(false);
        }
      };

      const handleSelectDemand = (id) => {
        setSelectedDemandId(id);
        setIsDrawerOpen(true);
      };

      return (
        <div className="flex h-full overflow-hidden bg-slate-950">
          {/* Sidebar */}
          <Sidebar
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            onSync={handleSync}
            isSyncing={isSyncing}
            lastSyncStatus={lastSyncStatus}
          />

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col overflow-hidden">
            {activeTab === 'dashboard' ? (
              <MainDashboard demands={demands} onSelectDemand={handleSelectDemand} />
            ) : activeTab === 'projects' ? (
              <ProjectView demands={demands} onSelectDemand={handleSelectDemand} />
            ) : activeTab === 'one-on-one' ? (
              <ManagerSyncView demands={demands} onSelectDemand={handleSelectDemand} />
            ) : activeTab === 'roadmap' ? (
              <RoadmapGraphView demands={demands} onSelectDemand={handleSelectDemand} />
            ) : activeTab === 'history' ? (
              <HistoryView onSelectDemand={handleSelectDemand} />
            ) : (
              <div className="flex-1 overflow-y-auto px-8 py-6 max-w-7xl mx-auto w-full space-y-6">
                <div>
                  <h2 className="text-2xl font-bold text-white tracking-tight">Demandas Sincronizadas</h2>
                  <p className="text-sm text-slate-400">Consolidado geral de itens de backlog com tags e filtros rápidos</p>
                </div>
                <DemandTable demands={demands} onSelectDemand={handleSelectDemand} />
              </div>
            )}
          </main>

          {/* Slide-over Drawer */}
          <DemandDrawer
            demandId={selectedDemandId}
            isOpen={isDrawerOpen}
            onClose={() => setIsDrawerOpen(false)}
            onRefreshDemands={loadDemands}
            allDemands={demands}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
