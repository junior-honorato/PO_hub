<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PO Hub - Consolidador de Backlogs</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS Play CDN Local -->
  <script src="/libs/tailwindcss.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#312e81',
            },
            sicoob: {
              primary: '#00AE9D',
              secondary: '#007A71',
              bg: '#F8F9FA',
              text: '#333333',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Custom CSS for Scrollbars & Animations -->
  <style>
    /* Custom Scrollbar for sleek UI */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #F8F9FA;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* Smooth Transitions */
    .drawer-transition {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fade-enter {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.3s forwards;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <!-- React & Babel Locais -->
  <script src="/libs/react.development.js"></script>
  <script src="/libs/react-dom.development.js"></script>
  <script src="/libs/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="/libs/lucide.min.js"></script>

  <!-- Dagre and React Flow CDNs -->
  <script src="/libs/dagre.min.js"></script>
  <link rel="stylesheet" href="/libs/reactflow.css">
  <script src="/libs/reactflow.min.js"></script>
  <script src="/libs/pptxgen.bundle.js"></script>
</head>
<body class="h-full bg-sicoob-bg text-sicoob-text font-sans antialiased overflow-hidden">
  <div id="root" class="h-full"></div>

  <!-- React code starts here -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const ReactFlowComponent = window.ReactFlow?.default || window.ReactFlow;
    const { Background, Controls, MarkerType, Position, Handle, useNodesState, useEdgesState } = window.ReactFlow || {};
    const dagre = window.dagre;

    // Componente de Ícone Lucide genérico para React (Evita DOMException do removeChild)
    function Icon({ name, className = "w-5 h-5", ...props }) {
      const ref = React.useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
          window.lucide.createIcons({
            root: ref.current
          });
        }
      }, [name, className]);
      return <span ref={ref} className="inline-flex items-center justify-center" {...props}></span>;
    }

    // Componente Sidebar
    function Sidebar({ activeTab, setActiveTab, onSync, isSyncing, lastSyncStatus, onOpenSettings }) {
      return (
        <aside className="w-64 bg-white border-r border-slate-200 flex flex-col h-full z-20 shadow-sm">
          {/* Logo */}
          <div className="p-6 border-b border-slate-200 flex items-center gap-3">
            <div className="bg-sicoob-primary p-2 rounded-xl text-white shadow-sm">
              <Icon name="layout-dashboard" className="w-6 h-6" />
            </div>
            <div>
              <h1 className="font-bold text-lg leading-none tracking-tight text-sicoob-text">PO Hub</h1>
              <span className="text-xs text-slate-500 font-medium">Consolidador Local</span>
            </div>
          </div>

          {/* Navegação */}
          <nav className="flex-1 px-4 py-6 space-y-1">
            <button
              onClick={() => setActiveTab('portfolio')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'portfolio'
                  ? 'bg-slate-100 text-sicoob-primary border-l-4 border-sicoob-primary font-semibold shadow-xs'
                  : 'text-slate-550 hover:bg-slate-50 hover:text-sicoob-primary'
              }`}
            >
              <Icon name="briefcase" className="w-5 h-5" />
              Portfólio Executivo
            </button>
            <button
              onClick={() => setActiveTab('planning')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'planning'
                  ? 'bg-slate-100 text-sicoob-primary border-l-4 border-sicoob-primary font-semibold shadow-xs'
                  : 'text-slate-550 hover:bg-slate-50 hover:text-sicoob-primary'
              }`}
            >
              <Icon name="calendar" className="w-5 h-5" />
              Planejamento Tático
            </button>
            <button
              onClick={() => setActiveTab('demands')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'demands'
                  ? 'bg-slate-100 text-sicoob-primary border-l-4 border-sicoob-primary font-semibold shadow-xs'
                  : 'text-slate-550 hover:bg-slate-50 hover:text-sicoob-primary'
              }`}
            >
              <Icon name="list-todo" className="w-5 h-5" />
              Demandas
            </button>

            <button
              onClick={() => setActiveTab('one-on-one')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'one-on-one'
                  ? 'bg-slate-100 text-sicoob-primary border-l-4 border-sicoob-primary font-semibold shadow-xs'
                  : 'text-slate-550 hover:bg-slate-50 hover:text-sicoob-primary'
              }`}
            >
              <Icon name="target" className="w-5 h-5" />
              Manager Sync
            </button>
            <button
              onClick={() => setActiveTab('history')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'history'
                  ? 'bg-slate-100 text-sicoob-primary border-l-4 border-sicoob-primary font-semibold shadow-xs'
                  : 'text-slate-550 hover:bg-slate-50 hover:text-sicoob-primary'
              }`}
            >
              <Icon name="history" className="w-5 h-5" />
              Histórico
            </button>
          </nav>

          {/* Sincronização e Rodapé */}
          <div className="p-4 border-t border-slate-200 bg-slate-50/50 space-y-3">
            <button
              onClick={onOpenSettings}
              className="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl text-xs font-semibold text-slate-600 hover:text-sicoob-text bg-white hover:bg-slate-50 border border-slate-200 transition-all select-none shadow-sm"
            >
              <Icon name="settings" className="w-4 h-4 text-slate-500 group-hover:text-slate-600" />
              Configurações
            </button>

            <button
              onClick={onSync}
              disabled={isSyncing}
              className="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-sm font-semibold text-white bg-sicoob-primary hover:bg-sicoob-secondary active:scale-95 transition-all shadow-sm disabled:opacity-50 disabled:pointer-events-none"
            >
              <Icon name="refresh-cw" className={`w-4 h-4 ${isSyncing ? 'animate-spin' : ''}`} />
              {isSyncing ? 'Sincronizando...' : 'Sincronizar APIs'}
            </button>
            
            {lastSyncStatus && (
              <div className="mt-3 text-center">
                <span className="text-[10px] text-slate-500 block">
                  Última Sync: {lastSyncStatus.time}
                </span>
                {lastSyncStatus.source && (
                  <span className="text-[10px] text-sicoob-primary font-semibold mt-0.5 block">
                    {lastSyncStatus.source}
                  </span>
                )}
              </div>
            )}
          </div>
        </aside>
      );
    }

    function MetricCards({ demands }) {
      const total = demands.length;
      const jiraCount = demands.filter(d => d.origin === 'Jira').length;
      const azureCount = demands.filter(d => d.origin === 'Azure').length;
      const tagCount = new Set(demands.flatMap(d => d.tags)).size;

      return (
        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
          <div className="bg-white border border-slate-200 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-sicoob-primary/30 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="layers" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Total de Demandas</p>
            <h3 className="text-3xl font-bold mt-2 text-sicoob-text">{total}</h3>
            <span className="text-xs text-sicoob-primary mt-2 block font-medium">Consolidado local</span>
          </div>

          <div className="bg-white border border-slate-200 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-sicoob-primary/30 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="columns" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Sicoob TI (Jira)</p>
            <h3 className="text-3xl font-bold mt-2 text-sky-400">{jiraCount}</h3>
            <span className="text-xs text-slate-500 mt-2 block">Sincronizado do Jira</span>
          </div>

          <div className="bg-white border border-slate-200 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-sicoob-primary/30 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="git-pull-request" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">MAG TI (Azure DevOps)</p>
            <h3 className="text-3xl font-bold mt-2 text-emerald-400">{azureCount}</h3>
            <span className="text-xs text-slate-500 mt-2 block">Sincronizado do Azure DevOps</span>
          </div>

          <div className="bg-white border border-slate-200 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-sicoob-primary/30 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="tags" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Tags Customizadas</p>
            <h3 className="text-3xl font-bold mt-2 text-purple-400">{tagCount}</h3>
            <span className="text-xs text-slate-500 mt-2 block">Criadas localmente</span>
          </div>
        </div>
      );
    }

    // Componente Tabela de Demandas
    function DemandTable({ demands, onSelectDemand, onRefreshDemands }) {
      const [isManualModalOpen, setIsManualModalOpen] = useState(false);
      const [newDemandTitle, setNewDemandTitle] = useState('');
      const [newDemandProject, setNewDemandProject] = useState('');
      const [projects, setProjects] = useState([]);

      const [isSyncByIdModalOpen, setIsSyncByIdModalOpen] = useState(false);
      const [syncIdInput, setSyncIdInput] = useState('');
      const [syncByIdLoading, setSyncByIdLoading] = useState(false);
      const [syncByIdFeedback, setSyncByIdFeedback] = useState({ type: null, message: '' });

      const handleOpenSyncByIdModal = () => {
        setSyncIdInput('');
        setSyncByIdFeedback({ type: null, message: '' });
        setIsSyncByIdModalOpen(true);
      };

      const handleSyncById = async (e) => {
        e.preventDefault();
        if (!syncIdInput.trim()) return;

        setSyncByIdLoading(true);
        setSyncByIdFeedback({ type: null, message: '' });

        const jiraUrl = localStorage.getItem('jira_url');
        const jiraEmail = localStorage.getItem('jira_email');
        const jiraToken = localStorage.getItem('jira_token');
        const azureOrg = localStorage.getItem('azure_org');
        const azureProject = localStorage.getItem('azure_project');
        const azureToken = localStorage.getItem('azure_token');

        try {
          const res = await fetch('/api/sync/by-id', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              externalId: syncIdInput.trim(),
              jiraUrl: jiraUrl || null,
              jiraEmail: jiraEmail || null,
              jiraToken: jiraToken || null,
              azureOrg: azureOrg || null,
              azureProject: azureProject || null,
              azureToken: azureToken || null
            })
          });

          if (res.ok) {
            setSyncByIdFeedback({
              type: 'success',
              message: `Demanda ${syncIdInput.trim()} importada com sucesso!`
            });
            if (onRefreshDemands) {
              await onRefreshDemands();
            }
            setTimeout(() => {
              setIsSyncByIdModalOpen(false);
            }, 1500);
          } else if (res.status === 404) {
            setSyncByIdFeedback({
              type: 'warning',
              message: "Demanda não encontrada. Verifique o ID e tente novamente."
            });
          } else {
            const errData = await res.json().catch(() => null);
            setSyncByIdFeedback({
              type: 'error',
              message: (errData && errData.detail) || "Não foi possível conectar ao serviço. Tente novamente em instantes."
            });
          }
        } catch (err) {
          console.error(err);
          setSyncByIdFeedback({
            type: 'error',
            message: "Não foi possível conectar ao serviço. Verifique a conexão com o servidor local."
          });
        } finally {
          setSyncByIdLoading(false);
        }
      };

      const fetchProjects = async () => {
        try {
          const res = await fetch('/api/projects');
          if (res.ok) {
            const data = await res.json();
            setProjects(data);
          }
        } catch (e) {
          console.error("Erro ao carregar projetos:", e);
        }
      };

      const handleOpenManualModal = () => {
        fetchProjects();
        setNewDemandTitle('');
        setNewDemandProject('');
        setIsManualModalOpen(true);
      };

      const handleCreateManualDemand = async (e) => {
        e.preventDefault();
        if (!newDemandTitle.trim()) return;
        try {
          const res = await fetch('/api/demands/manual', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: newDemandTitle,
              project_name: newDemandProject || null
            })
          });
          if (res.ok) {
            setIsManualModalOpen(false);
            if (onRefreshDemands) {
              onRefreshDemands();
            }
          } else {
            const err = await res.json();
            alert(err.detail || "Erro ao criar demanda manual.");
          }
        } catch (err) {
          console.error(err);
          alert("Erro de conexão ao criar demanda.");
        }
      };

      const [search, setSearch] = useState('');
      const [originFilter, setOriginFilter] = useState('All');
      const [itemTypeFilter, setItemTypeFilter] = useState('All');
      const [selectedTag, setSelectedTag] = useState('');
      const [selectedStatus, setSelectedStatus] = useState([]);
      const [sortBy, setSortBy] = useState('updated-desc');
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 10;

      // Extrai todas as tags únicas
      const allTags = Array.from(new Set(demands.flatMap(d => d.tags)));
      // Extrai todos os status únicos
      const allStatuses = Array.from(new Set(demands.map(d => d.externalStatus).filter(Boolean)));
      // Extrai todos os tipos de item únicos
      const allTypes = Array.from(new Set(demands.map(d => d.itemType).filter(Boolean)));

      const handleSort = (field) => {
        if (field === 'id') {
          setSortBy(sortBy === 'id-asc' ? 'id-desc' : 'id-asc');
        } else if (field === 'title') {
          setSortBy(sortBy === 'title-asc' ? 'title-desc' : 'title-asc');
        } else if (field === 'status') {
          setSortBy(sortBy === 'status-asc' ? 'status-desc' : 'status-asc');
        }
        setCurrentPage(1);
      };

      const renderSortIcon = (field) => {
        if (field === 'id') {
          if (sortBy === 'id-asc') return <Icon name="arrow-up" className="w-3.5 h-3.5 ml-1.5" />;
          if (sortBy === 'id-desc') return <Icon name="arrow-down" className="w-3.5 h-3.5 ml-1.5" />;
        } else if (field === 'title') {
          if (sortBy === 'title-asc') return <Icon name="arrow-up" className="w-3.5 h-3.5 ml-1.5" />;
          if (sortBy === 'title-desc') return <Icon name="arrow-down" className="w-3.5 h-3.5 ml-1.5" />;
        } else if (field === 'status') {
          if (sortBy === 'status-asc') return <Icon name="arrow-up" className="w-3.5 h-3.5 ml-1.5" />;
          if (sortBy === 'status-desc') return <Icon name="arrow-down" className="w-3.5 h-3.5 ml-1.5" />;
        }
        return <Icon name="arrow-up-down" className="w-3.5 h-3.5 ml-1.5 text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity" />;
      };

      const filteredDemands = demands.filter(d => {
        const matchesSearch = d.title.toLowerCase().includes(search.toLowerCase()) || d.externalId.toLowerCase().includes(search.toLowerCase());
        const matchesOrigin = originFilter === 'All' || d.origin === originFilter;
        const matchesTag = !selectedTag || d.tags.includes(selectedTag);
        const matchesStatus = selectedStatus.length === 0 || selectedStatus.includes(d.externalStatus);
        const matchesItemType = itemTypeFilter === 'All' || d.itemType === itemTypeFilter;
        return matchesSearch && matchesOrigin && matchesTag && matchesStatus && matchesItemType;
      });

      const sortedDemands = [...filteredDemands].sort((a, b) => {
        if (sortBy === 'updated-desc') {
          return new Date(b.updatedAt.replace(' ', 'T')) - new Date(a.updatedAt.replace(' ', 'T'));
        }
        if (sortBy === 'updated-asc') {
          return new Date(a.updatedAt.replace(' ', 'T')) - new Date(b.updatedAt.replace(' ', 'T'));
        }
        if (sortBy === 'title-asc') {
          return a.title.localeCompare(b.title, 'pt-BR');
        }
        if (sortBy === 'title-desc') {
          return b.title.localeCompare(a.title, 'pt-BR');
        }
        if (sortBy === 'id-asc') {
          return a.externalId.localeCompare(b.externalId, undefined, { numeric: true, sensitivity: 'base' });
        }
        if (sortBy === 'id-desc') {
          return b.externalId.localeCompare(a.externalId, undefined, { numeric: true, sensitivity: 'base' });
        }
        if (sortBy === 'status-asc') {
          return (a.externalStatus || '').localeCompare(b.externalStatus || '', 'pt-BR');
        }
        if (sortBy === 'status-desc') {
          return (b.externalStatus || '').localeCompare(b.externalStatus || '', 'pt-BR');
        }
        return 0;
      });

      const handleSearchChange = (e) => {
        setSearch(e.target.value);
        setCurrentPage(1);
      };

      const handleOriginFilterChange = (e) => {
        setOriginFilter(e.target.value);
        setCurrentPage(1);
      };

      const handleTagFilterChange = (e) => {
        setSelectedTag(e.target.value);
        setCurrentPage(1);
      };

      const handleSortByChange = (e) => {
        setSortBy(e.target.value);
        setCurrentPage(1);
      };

      const handleClearFilters = () => {
        setSearch('');
        setOriginFilter('All');
        setItemTypeFilter('All');
        setSelectedTag('');
        setSelectedStatus([]);
        setSortBy('updated-desc');
        setCurrentPage(1);
      };

      const totalPages = Math.ceil(sortedDemands.length / itemsPerPage);
      const activePage = Math.min(Math.max(currentPage, 1), Math.max(totalPages, 1));
      const startIndex = (activePage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const paginatedDemands = sortedDemands.slice(startIndex, endIndex);

      return (
        <div className="space-y-4">
          {/* Barra de Filtros */}
          <div className="flex flex-col gap-4 bg-slate-50 p-4 border border-slate-200 rounded-2xl backdrop-blur-sm">
            {/* Linha Principal: Pesquisa e Controles Básicos */}
            <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
              <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 flex-1 w-full lg:w-auto">
                <div className="flex-1 relative">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                    <Icon name="search" className="w-4 h-4" />
                  </div>
                  <input
                    type="text"
                    placeholder="Buscar por título ou ID..."
                    value={search}
                    onChange={handleSearchChange}
                    className="w-full bg-white border border-slate-200 rounded-xl py-2.5 pl-10 pr-4 text-sm text-sicoob-text placeholder-slate-500 focus:outline-none focus:border-brand-500 transition-colors"
                  />
                </div>
                <button
                  onClick={handleOpenManualModal}
                  className="flex items-center justify-center gap-1.5 px-4 py-2.5 bg-sicoob-primary hover:bg-sicoob-secondary active:scale-95 text-white text-xs font-bold rounded-xl transition-all shadow-lg shadow-brand-600/20 whitespace-nowrap"
                >
                  <Icon name="plus" className="w-3.5 h-3.5" /> Nova Demanda de Negócio
                </button>
                <button
                  onClick={handleOpenSyncByIdModal}
                  className="flex items-center justify-center gap-1.5 px-4 py-2.5 bg-slate-100 hover:bg-slate-100 active:scale-95 text-sicoob-text hover:text-white text-xs font-bold rounded-xl transition-all border border-slate-300 whitespace-nowrap animate-in"
                >
                  <Icon name="refresh-cw" className="w-3.5 h-3.5" /> Adicionar Manualmente Demanda Sicoob/MAG TI
                </button>
              </div>
              
              <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                {/* Filtro por Origem */}
                <select
                  value={originFilter}
                  onChange={handleOriginFilterChange}
                  className="bg-white border border-slate-350 rounded-xl py-2 px-3 text-xs text-sicoob-text focus:outline-none focus:border-sicoob-primary"
                >
                  <option value="All">Origem</option>
                  <option value="Jira">Sicoob TI (Jira)</option>
                  <option value="Azure">MAG TI (Azure DevOps)</option>
                  <option value="Negocio">Negócio (Manual)</option>
                </select>

                {/* Filtro por Tipo de Item */}
                <select
                  value={itemTypeFilter}
                  onChange={(e) => { setItemTypeFilter(e.target.value); setCurrentPage(1); }}
                  className="bg-white border border-slate-350 rounded-xl py-2 px-3 text-xs text-sicoob-text focus:outline-none focus:border-sicoob-primary"
                >
                  <option value="All">Tipo de Item</option>
                  {allTypes.map(type => (
                    <option key={type} value={type}>{type}</option>
                  ))}
                </select>

                {/* Filtro por Tags */}
                <select
                  value={selectedTag}
                  onChange={handleTagFilterChange}
                  className="bg-white border border-slate-350 rounded-xl py-2 px-3 text-xs text-sicoob-text focus:outline-none focus:border-sicoob-primary"
                >
                  <option value="">Tags</option>
                  {allTags.map(tag => (
                    <option key={tag} value={tag}>{tag}</option>
                  ))}
                </select>

                {/* Ordenação */}
                <select
                  value={sortBy}
                  onChange={handleSortByChange}

                    onClick={handleClearFilters}

                      const isFirstOrLast = page === 1 || page === totalPages;
                      
                      if (!isNear && !isFirstOrLast) {
                        if (page === 2 || page === totalPages - 1) {
                          return <span key={`ell-${page}`} className="px-1.5 text-slate-600">...</span>;
                        }
                        return null;

                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                
                <form onSubmit={handleCreateManualDemand} className="space-y-4">

                    <label className="text-xs text-slate-500 font-semibold">Título da Demanda</label>
                    <input
                      type="text"
                      required
                      placeholder="Ex: Criar Nova Regra de Repasse"
                      value={newDemandTitle}
                      onChange={e => setNewDemandTitle(e.target.value)}
                      className="w-full bg-white border border-slate-350 rounded-xl px-3 py-2 text-sm text-sicoob-text focus:outline-none focus:border-sicoob-primary"
                    />
                  </div>
                  
                  <div className="space-y-1.5">
                    <label className="text-xs text-slate-500 font-semibold">Projeto Vinculado</label>
                    <select
                      value={newDemandProject}
                      onChange={e => setNewDemandProject(e.target.value)}
                      className="w-full bg-white border border-slate-350 rounded-xl px-3 py-2 text-sm text-sicoob-text focus:outline-none focus:border-sicoob-primary"
                    >
                      <option value="">Nenhum (Sem vínculo)</option>

                  <div className="flex justify-end gap-3 pt-2">

                      type="button"

                      Cancelar

                    <button
                      type="submit"

                      Criar Demanda
                    </button>

                </form>

            </div>
          )}

          {/* Modal Sincronização por ID */}
          {isSyncByIdModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="fixed inset-0 bg-black/60 backdrop-blur-xs" onClick={() => setIsSyncByIdModalOpen(false)} />
              <div className="relative bg-white border border-slate-200 rounded-2xl w-full max-w-md p-6 shadow-md space-y-4 text-left">
                <div className="flex items-center justify-between">
                  <h3 className="text-lg font-bold text-sicoob-text">Adicionar por ID</h3>
                  <button 
                    onClick={() => setIsSyncByIdModalOpen(false)}
                    className="text-slate-500 hover:text-white p-1 rounded-lg"
                  >
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                
                <form onSubmit={handleSyncById} className="space-y-4">
                  <div className="space-y-1.5">
                    <label className="text-xs text-slate-500 font-semibold">ID do Sicoob TI (Jira) ou da MAG TI (Azure DevOps)</label>
                    <input
                      type="text"
                      required
                      placeholder="Ex: SGRVDI-2262 (Sicoob TI) ou 2329 (MAG TI)"
                      value={syncIdInput}
                      onChange={e => setSyncIdInput(e.target.value)}
                      disabled={syncByIdLoading}
                      className="w-full bg-white border border-slate-350 rounded-xl px-3 py-2 text-sm text-sicoob-text focus:outline-none focus:border-sicoob-primary disabled:opacity-55"
                    />
                  </div>

                  {syncByIdFeedback.type && (
                    <div className={`p-3.5 rounded-xl text-xs font-semibold leading-relaxed border ${
                      syncByIdFeedback.type === 'success' ? 'bg-emerald-500/10 text-emerald-450 border-emerald-500/25' :
                      syncByIdFeedback.type === 'warning' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' :
                      'bg-rose-500/10 text-rose-450 border-rose-500/25'
                    }`}>
                      {syncByIdFeedback.message}
                    </div>
                  )}
                  
                  <div className="flex justify-end gap-3 pt-2">
                    <button
                      type="button"
                      onClick={() => setIsSyncByIdModalOpen(false)}
                      disabled={syncByIdLoading}
                      className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-semibold disabled:opacity-50"
                    >
                      Cancelar
                    </button>
                    <button
                      type="submit"
                      disabled={syncByIdLoading || !syncIdInput.trim()}
                      className="px-4 py-2 bg-sicoob-primary hover:bg-sicoob-secondary text-white rounded-xl text-xs font-semibold flex items-center gap-1.5 disabled:opacity-60"

                      {syncByIdLoading && <Icon name="refresh-cw" className="w-3.5 h-3.5 animate-spin" />}
                      Sincronizar
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Componente StatusMapperTab para Mapeamento de Status
    function StatusMapperTab() {
      const [mappings, setMappings] = React.useState([]);
      const [origin, setOrigin] = React.useState('Jira');
      const [externalStatus, setExternalStatus] = React.useState('');
      const [mappedStatus, setMappedStatus] = React.useState('Backlog');
      const [loading, setLoading] = React.useState(false);

      const fetchMappings = async () => {
        try {
          const res = await fetch('/api/status-mappings');
          if (res.ok) {
            const data = await res.json();
            setMappings(data);
          }
        } catch (e) {
          console.error("Erro ao buscar mapeamentos de status:", e);
        }
      };

      React.useEffect(() => {
        fetchMappings();
      }, []);

      const handleAddMapping = async (e) => {
        e.preventDefault();
        if (!externalStatus.trim()) return;

        setLoading(true);
        try {
          const res = await fetch('/api/status-mappings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              origin,
              external_status: externalStatus.trim(),
              mapped_status: mappedStatus
            })
          });
          if (res.ok) {
            setExternalStatus('');
            fetchMappings();
          } else {
            const err = await res.json();
            alert(err.detail || "Erro ao salvar mapeamento.");
          }
        } catch (e) {
          console.error(e);
          alert("Erro de rede ao salvar mapeamento.");
        } finally {
          setLoading(false);
        }
      };

      const handleDeleteMapping = async (id) => {
        if (!window.confirm("Deseja realmente excluir este mapeamento?")) return;

        try {
          const res = await fetch(`/api/status-mappings/${id}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            fetchMappings();
          } else {
            alert("Erro ao excluir mapeamento.");
          }
        } catch (e) {
          console.error(e);
          alert("Erro ao excluir mapeamento.");
        }
      };

      return (
        <div className="space-y-6">
          <form onSubmit={handleAddMapping} className="bg-white border border-slate-200 p-4 rounded-xl space-y-4 shadow-sm">
            <h4 className="text-xs font-bold text-slate-600 uppercase tracking-wider">Novo Mapeamento de Status</h4>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div className="space-y-1">
                <label className="text-[10px] text-slate-500 font-bold uppercase">Origem</label>
                <select
                  value={origin}
                  onChange={e => setOrigin(e.target.value)}
                  className="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-600 focus:outline-none focus:border-brand-500 transition-colors"
                >
                  <option value="Jira">Sicoob TI (Jira)</option>
                  <option value="Azure">MAG TI (Azure DevOps)</option>
                  <option value="Negocio">Negócio (Local)</option>
                </select>
              </div>

              <div className="space-y-1">
                <label className="text-[10px] text-slate-500 font-bold uppercase">Status Externo</label>
                <input
                  type="text"
                  placeholder="Ex: In Progress, Approved"
                  value={externalStatus}
                  onChange={e => setExternalStatus(e.target.value)}
                  className="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-600 focus:outline-none focus:border-brand-500 transition-colors"
                  required
                />
              </div>

              <div className="space-y-1">
                <label className="text-[10px] text-slate-500 font-bold uppercase">Categoria Unificada</label>
                <select
                  value={mappedStatus}
                  onChange={e => setMappedStatus(e.target.value)}
                  className="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-600 focus:outline-none focus:border-brand-500 transition-colors"
                >
                  <option value="Backlog">Backlog</option>
                  <option value="Em Refinamento">Em Refinamento</option>
                  <option value="Desenvolvimento">Em Desenvolvimento</option>
                  <option value="Homologação">Homologação</option>
                  <option value="Entregue">Entregue</option>
                </select>
              </div>
            </div>
            <div className="flex justify-end pt-1">
              <button
                type="submit"
                disabled={loading}
                className="flex items-center gap-1.5 px-3 py-1.5 bg-sicoob-primary hover:bg-sicoob-secondary rounded-lg text-xs font-bold text-white transition-colors cursor-pointer disabled:opacity-50"
              >
                <Icon name="plus" className="w-3.5 h-3.5" /> Adicionar Regra
              </button>
            </div>
          </form>

          <div className="space-y-2">
            <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider px-1">Mapeamentos Ativos</h4>
            {mappings.length > 0 ? (
              <div className="border border-slate-200 rounded-xl overflow-hidden bg-white/10">
                <div className="max-h-[450px] overflow-y-auto custom-scrollbar">
                  <table className="w-full text-left border-collapse text-xs">
                    <thead>
                      <tr className="bg-white/60 text-slate-500 border-b border-slate-200">
                        <th className="px-4 py-2.5 font-bold">Origem</th>
                        <th className="px-4 py-2.5 font-bold">Status Original</th>
                        <th className="px-4 py-2.5 font-bold">Categoria</th>
                        <th className="px-4 py-2.5 font-bold text-right">Ações</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200">
                      {mappings.map(m => (
                        <tr key={m.id} className="hover:bg-white border border-slate-200 shadow-xs text-slate-600 transition-all">
                          <td className="px-4 py-2">
                            <span className={`inline-flex items-center px-1.5 py-0.5 rounded-full font-bold text-[9px] ${
                              m.origin === 'Jira' ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' :
                              m.origin === 'Azure' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' :
                              'bg-purple-50 text-purple-700 border border-purple-100'
                            }`}>
                              {m.origin === 'Azure' ? 'MAG TI (Azure DevOps)' : m.origin === 'Jira' ? 'Sicoob TI (Jira)' : m.origin}
                            </span>
                          </td>
                          <td className="px-4 py-2 font-medium font-mono">{m.external_status}</td>
                          <td className="px-4 py-2">
                            <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded font-bold text-[9px] ${
                              m.mapped_status === 'Backlog' ? 'bg-slate-850 text-slate-500 border border-slate-300/65' :
                              m.mapped_status === 'Em Refinamento' ? 'bg-purple-500/10 text-purple-400 border border-purple-500/15' :
                              m.mapped_status === 'Desenvolvimento' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/15' :
                              m.mapped_status === 'Homologação' ? 'bg-blue-500/10 text-blue-400 border border-blue-500/15' :
                              'bg-emerald-500/10 text-emerald-400 border border-emerald-500/15'
                            }`}>
                              {m.mapped_status}
                            </span>
                          </td>
                          <td className="px-4 py-2 text-right">
                            <button
                              onClick={() => handleDeleteMapping(m.id)}
                              className="p-1 hover:bg-rose-500/10 text-slate-500 hover:text-rose-455 rounded-md transition-all cursor-pointer"
                            >
                              <Icon name="trash-2" className="w-3.5 h-3.5" />
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : (
              <div className="flex flex-col items-center justify-center p-8 bg-white/10 border border-slate-250 border-dashed rounded-xl text-slate-500 space-y-2">
                <Icon name="shield-alert" className="w-8 h-8 text-slate-500" />
                <span className="text-xs">Nenhum mapeamento de status cadastrado localmente.</span>
              </div>
            )}
          </div>
        </div>
      );
    }

      const [dbPath, setDbPath] = React.useState('');
      const [defaultDbPath, setDefaultDbPath] = React.useState('');
      const [dbSaveError, setDbSaveError] = React.useState('');
      const [dbSaveSuccess, setDbSaveSuccess] = React.useState(false);
      const [isSavingDb, setIsSavingDb] = React.useState(false);

      const fetchDbPath = async () => {
        try {
          const res = await fetch('/api/settings/db-path');
          if (res.ok) {
            const data = await res.json();
            setDbPath(data.current_path || '');
            setDefaultDbPath(data.default_path || '');

      const handleSave = (e) => {
        e.preventDefault();
        localStorage.setItem('jira_url', jiraUrl.trim());

        localStorage.setItem('azure_org', azureOrg.trim());

                {/* Seção Azure */}

                          type="text"
                          placeholder="seu-projeto"
                          value={azureProject}
                          onChange={e => setAzureProject(e.target.value)}
                          className="w-full bg-white border border-slate-350 rounded-xl px-3 py-2 text-xs text-sicoob-text focus:outline-none focus:border-sicoob-primary transition-colors"

                      </div>
                    </div>
                    <div className="space-y-1">
                      <label className="text-xs text-slate-500 font-medium">Token de Acesso (MAG TI)</label>
                      <input
                        type="password"
                        placeholder="••••••••••••••••••••"

                        onChange={e => setAzureToken(e.target.value)}

                      />

                <div className="flex justify-end gap-3 pt-4 border-t border-slate-200">
                  <button
                    type="button"

                    Salvar Credenciais
                  </button>
                </div>
              </form>
            ) : activeTab === 'mappings' ? (
              <StatusMapperTab />
            ) : (
              <form onSubmit={handleSaveDbPath} className="space-y-6">
                <div className="space-y-4">
                  <h3 className="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5">
                    <Icon name="settings" className="w-3.5 h-3.5" /> Armazenamento do Banco de Dados
                  </h3>
                  
                  <div className="bg-white/40 border border-slate-200 rounded-xl p-4 text-xs text-slate-500 space-y-2.5 leading-relaxed">
                    <p>
                      <strong>Como sincronizar com o OneDrive ou Rede:</strong>
                    </p>
                    <ul className="list-disc pl-4 space-y-1">
                      <li>O banco de dados do PO Hub utiliza SQLite (arquivo local). Não é possível conectar diretamente a links HTTP/HTTPS do OneDrive.</li>
                      <li>Para hospedar o banco na nuvem, você deve especificar abaixo o <strong>caminho físico absoluto da pasta local</strong> sincronizada no seu computador pelo aplicativo do OneDrive (ex: <code className="bg-white px-1 py-0.5 rounded text-sicoob-primary">C:\Users\usuario\OneDrive - Empresa\PO_Hub</code>).</li>
                      <li>O aplicativo desktop do OneDrive se encarregará de sincronizar os arquivos automaticamente para a nuvem.</li>
                      <li><strong>Nota:</strong> Ao salvar, os dados existentes serão copiados para a nova pasta e a página será recarregada. Se deixar em branco, o sistema usará a pasta padrão do projeto.</li>
                    </ul>
                  </div>

                  {dbSaveError && (
                    <div className="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs px-4 py-3 rounded-xl">
                      {dbSaveError}
                    </div>
                  )}

                  {dbSaveSuccess && (
                    <div className="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs px-4 py-3 rounded-xl">
                      Caminho do banco de dados atualizado com sucesso! Recarregando aplicação...
                    </div>
                  )}

                  <div className="space-y-1">
                    <label className="text-xs text-slate-500 font-medium flex items-center justify-between">
                      <span>Caminho da Pasta do Banco de Dados (OneDrive / Rede)</span>
                      <span className="text-[10px] text-slate-500">Padrão: {defaultDbPath || 'Carregando...'}</span>
                    </label>
                    <input
                      type="text"
                      placeholder="Ex: C:\Users\nome\OneDrive - Empresa\PO_Hub"
                      value={dbPath}
                      onChange={e => setDbPath(e.target.value)}
                      className="w-full bg-white border border-slate-350 rounded-xl px-3 py-2 text-xs text-sicoob-text focus:outline-none focus:border-sicoob-primary transition-colors"
                    />
                  </div>
                </div>

                <div className="flex justify-end gap-3 pt-4 border-t border-slate-200">
                  <button
                    type="button"
                    onClick={onClose}
                    className="px-4 py-2 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl text-xs font-bold text-slate-500 hover:text-sicoob-text transition-colors"
                  >
                    Cancelar
                  </button>
                  <button
                    type="submit"
                    disabled={isSavingDb}
                    className="px-4 py-2 bg-sicoob-primary hover:bg-sicoob-secondary rounded-xl text-xs font-bold text-white transition-colors disabled:opacity-50 disabled:pointer-events-none"
                  >
                    {isSavingDb ? 'Salvando e Migrando...' : 'Salvar e Migrar Banco'}
                  </button>
                </div>
              </form>
            )}
          </div>
        </div>
      );
    }

    // Componente Slide-Over Drawer (Painel de Detalhes)
    function DemandDrawer({ demandId, isOpen, onClose, onRefreshDemands, allDemands = [] }) {
      const [demand, setDemand] = useState(null);
      const [note, setNote] = useState('');
      const [tagInput, setTagInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [summarizing, setSummarizing] = useState(false);
      const [showExternalComments, setShowExternalComments] = useState(false);
      const [projects, setProjects] = useState([]);
      const [parentSearchQuery, setParentSearchQuery] = useState('');
      const [isParentSearchOpen, setIsParentSearchOpen] = useState(false);
      const [blockerSearchQuery, setBlockerSearchQuery] = useState('');
      const [isBlockerSearchOpen, setIsBlockerSearchOpen] = useState(false);
      const [currentStatusNotes, setCurrentStatusNotes] = useState('');
      const [blockerNotes, setBlockerNotes] = useState('');
      const [promisedDate, setPromisedDate] = useState('');
      const [followUpDate, setFollowUpDate] = useState('');
      const [titleInput, setTitleInput] = useState('');
      const [isEditingTitle, setIsEditingTitle] = useState(false);

      const getExternalUrl = () => {
        if (!demand) return null;
        if (demand.origin === 'Jira') {
          const jiraUrl = localStorage.getItem('jira_url');
          if (jiraUrl) {
            const cleanUrl = jiraUrl.replace(/\/$/, '');
            return `${cleanUrl}/browse/${demand.externalId}`;
          }
        } else if (demand.origin === 'Azure') {
          const azureOrg = localStorage.getItem('azure_org');
          const azureProject = localStorage.getItem('azure_project');
          if (azureOrg && azureProject) {
            return `https://dev.azure.com/${azureOrg}/${azureProject}/_workitems/edit/${demand.externalId}`;
          }
        }
        return demand.externalUrl;
      };
      const externalUrl = getExternalUrl();

      const loadProjects = async () => {
        try {
          const res = await fetch('/api/projects');
          if (res.ok) {
            const data = await res.json();
            setProjects(data);
          }
        } catch (e) {
          console.error("Erro ao carregar projetos:", e);
        }
      };

      useEffect(() => {
        if (isOpen && demandId) {
          loadDemandDetail();
          loadProjects();
          setShowExternalComments(false);
        } else {
          setDemand(null);
          setProjects([]);
          setShowExternalComments(false);
          setIsParentSearchOpen(false);
          setIsBlockerSearchOpen(false);
          setParentSearchQuery('');
          setBlockerSearchQuery('');
          setCurrentStatusNotes('');
          setBlockerNotes('');
          setPromisedDate('');
          setFollowUpDate('');
          setTitleInput('');
          setIsEditingTitle(false);
        }
      }, [demandId, isOpen]);

      const handleDeleteDemand = async () => {
        if (!demandId) return;
        const confirmed = window.confirm("Tem certeza de que deseja excluir permanentemente esta demanda local?");
        if (!confirmed) return;
        
        try {
          const res = await fetch(`/api/demands/${demandId}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            onClose();
            if (onRefreshDemands) {
              onRefreshDemands();
            }
          } else {
            const err = await res.json();
            alert(err.detail || "Erro ao excluir a demanda.");
          }
        } catch (e) {
          console.error(e);
          alert("Erro ao conectar ao servidor.");
        }
      };

      const loadDemandDetail = async () => {
        setLoading(true);
        try {
          const res = await fetch(`/api/demands/${demandId}`);
          if (res.ok) {
            const data = await res.json();
            setDemand(data);
            setTitleInput(data.title || '');
            setCurrentStatusNotes(data.current_status_notes || '');
            setBlockerNotes(data.blocker_notes || '');
            setPromisedDate(data.promisedDate || '');
            setFollowUpDate(data.followUpDate || '');
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      const handleSummarize = async () => {
        if (!demandId) return;
        setSummarizing(true);
        try {
          const res = await fetch(`/api/demands/${demandId}/summarize`, {
            method: 'POST'
          });
          if (res.ok) {
            const data = await res.json();
            setDemand(prev => ({
              ...prev,
              ai_summary: data.ai_summary,
              summary_updated_at: data.summary_updated_at
            }));
            if (onRefreshDemands) {
              onRefreshDemands();
            }
          } else {
            const errData = await res.json();
            alert(errData.detail || "Erro ao gerar resumo inteligênte.");
          }
        } catch (e) {
          console.error("Erro ao resumir demanda:", e);
          alert("Erro ao conectar ao servidor para gerar o resumo.");
        } finally {
          setSummarizing(false);
        }
      };

      const handleAddNote = async (e) => {
        e.preventDefault();
        if (!note.trim()) return;

        try {
          const res = await fetch(`/api/demands/${demandId}/annotations`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: note })
          });
          if (res.ok) {
            setNote('');
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleAddTag = async (e) => {
        e.preventDefault();
        const tag = tagInput.trim().toLowerCase();
        if (!tag || demand.tags.includes(tag)) return;

        try {
          const res = await fetch(`/api/demands/${demandId}/tags`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tag })
          });
          if (res.ok) {
            setTagInput('');
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleRemoveTag = async (tag) => {
        try {
          const res = await fetch(`/api/demands/${demandId}/tags/${tag}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleUpdateManagementField = async (field, value) => {
        setDemand(prev => ({
          ...prev,
          [field]: value
        }));
        if (field === 'promisedDate') setPromisedDate(value || '');
        if (field === 'followUpDate') setFollowUpDate(value || '');
        try {
          await fetch(`/api/demands/${demandId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ [field]: value || null })
          });
          onRefreshDemands();
        } catch (e) {
          console.error("Erro ao atualizar campo de gestão:", e);
        }
      };

      const handleSelectParent = async (val) => {
        await handleUpdateManagementField('localParentId', val);
        setIsParentSearchOpen(false);
        setParentSearchQuery('');
        loadDemandDetail();
      };

      const handleSelectBlocker = async (blockerId) => {
        try {
          const res = await fetch(`/api/demands/${demandId}/dependencies`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ blocker_id: blockerId })
          });
          if (res.ok) {
            setIsBlockerSearchOpen(false);
            setBlockerSearchQuery('');
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleRemoveBlocker = async (blockerId) => {
        try {
          const res = await fetch(`/api/demands/${demandId}/dependencies/${blockerId}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const formatDate = (isoString) => {
        if (!isoString) return '-';
        try {
          const cleanIso = isoString.replace(' ', 'T');
          const d = new Date(cleanIso.indexOf('T') !== -1 ? cleanIso : cleanIso + 'T00:00:00');
          if (isNaN(d.getTime())) {
            return isoString;
          }
          return d.toLocaleDateString('pt-BR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch (e) {
          console.error("Erro ao formatar data:", e);
          return isoString;
        }
      };

      if (!isOpen) return null;

      return (
        <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 md:p-6 transition-all duration-300 ${isOpen ? 'visible opacity-100' : 'invisible opacity-0'}`}>
          {/* Backdrop */}
          <div
            onClick={onClose}
            className="fixed inset-0 bg-black/65 backdrop-blur-xs transition-opacity duration-300"
          />
          
          {/* Modal Container */}
          <div className="relative bg-white border border-slate-200 rounded-2xl shadow-md w-full max-w-5xl h-[85vh] md:h-[90vh] flex flex-col overflow-hidden z-10 animate-in zoom-in-95 duration-200">
            {/* Header */}
            <div className="p-5 border-b border-slate-200 flex items-center justify-between shrink-0">
              <div className="flex items-center gap-2">
                <span className={`w-2.5 h-2.5 rounded-full ${
                  demand?.origin === 'Jira' ? 'bg-sky-400' : 'bg-emerald-400'
                }`} />
                <span className="text-xs text-slate-500 uppercase tracking-widest font-semibold font-mono">
                  {demand?.origin} / {demand?.externalId}
                </span>
              </div>
              <div className="flex items-center gap-2">
                {externalUrl && (
                  <a
                    href={externalUrl}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-sicoob-primary hover:text-sicoob-secondary hover:bg-slate-100/80 rounded-xl transition-all"
                    title={`Ver no ${demand.origin}`}
                  >
                    <Icon name="external-link" className="w-3.5 h-3.5" />
                    Ver no {demand.origin}
                  </a>
                )}
                <button
                  onClick={onClose}
                  className="p-1.5 rounded-lg text-slate-500 hover:text-white hover:bg-slate-100 transition-all"
                >
                  <Icon name="x" className="w-4 h-4" />
                </button>
              </div>
            </div>

            {loading ? (
              <div className="flex-1 flex flex-col items-center justify-center text-slate-500">
                <Icon name="refresh-cw" className="w-8 h-8 animate-spin text-brand-500 mb-2" />
                Carregando detalhes...
              </div>
            ) : demand ? (
              <div className="flex-1 overflow-y-auto p-6 flex flex-col lg:flex-row gap-6">
                
                {/* Left Column: Description, Status Report, AI Summary, Annotations */}
                <div className="flex-1 space-y-6 lg:pr-6 lg:border-r lg:border-slate-200 min-w-0">
                  {/* Title & Status */}
                  <div className="space-y-3">
                    {demand.origin === 'Negocio' ? (
                      isEditingTitle ? (
                        <div className="flex items-center gap-2">
                          <input
                            type="text"

    // Componente Modo One-on-One
    function ManagerSyncView({ demands, onSelectDemand }) {
      const getTodayStr = () => {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      const todayStr = getTodayStr();

      const targetDemands = demands.filter(d => {
        const matchesFollowUp = d.followUpDate && d.followUpDate <= todayStr;
        const matchesOverdue = d.promisedDate && d.promisedDate < todayStr && d.externalStatus !== 'Concluído' && d.externalStatus !== 'Done';
        return matchesFollowUp || matchesOverdue;
      });

      return (
        <div className="space-y-6 flex-1 overflow-y-auto w-full px-4 py-4 sm:px-6 lg:px-8 xl:px-12 sm:py-6">
          <div>
            <h2 className="text-2xl font-bold text-sicoob-text tracking-tight flex items-center gap-2">
              <Icon name="target" className="w-6 h-6 text-yellow-400 animate-pulse" />
              Modo One-on-One
            </h2>
            <p className="text-sm text-slate-500">Rastreamento de prazos acordados, cobranças pendentes e notas executivas</p>
          </div>

          {targetDemands.length > 0 ? (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {targetDemands.map(demand => {
                const isOverdue = demand.promisedDate && demand.promisedDate < todayStr && demand.externalStatus !== 'Concluído' && demand.externalStatus !== 'Done';
                const isFollowUpDue = demand.followUpDate && demand.followUpDate <= todayStr;
                
                return (
                  <div
                    key={demand.externalId}
                    onClick={() => onSelectDemand(demand.externalId)}
                    className="bg-white border border-slate-200 hover:border-slate-300 rounded-2xl p-5 space-y-4 hover:bg-white/60 cursor-pointer transition-all group relative flex flex-col justify-between"
                  >
                    <div className="space-y-3">
                      <div className="flex items-center justify-between gap-3">
                        <div className="flex items-center gap-2">
                          <span className={`w-2.5 h-2.5 rounded-full ${
                            demand.origin === 'Jira' ? 'bg-sky-400' : 'bg-emerald-400'
                          }`} />
                          <span className="text-xs font-bold text-slate-500 uppercase">{demand.externalId}</span>
                        </div>
                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${
                          demand.externalStatus === 'Concluído' || demand.externalStatus === 'Done'
                            ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
                            : 'bg-sicoob-primary/10 text-sicoob-primary border border-sicoob-primary/20'
                        }`}>
                          {demand.externalStatus}
                        </span>
                      </div>

                      <h3 className="font-bold text-base text-sicoob-text group-hover:text-white transition-colors line-clamp-2">
                        {demand.title}
                      </h3>

                      {/* Badges de Atenção */}
                      <div className="flex flex-wrap gap-2 pt-1">
                        {isOverdue && (
                          <span className="inline-flex items-center gap-1.5 text-[10px] font-bold bg-rose-50 text-rose-700 border border-rose-100 px-2.5 py-1 rounded-md">
                            <Icon name="alert-triangle" className="w-3.5 h-3.5" />
                            Prazo Estourado ({demand.promisedDate})
                          </span>
                        )}
                        {isFollowUpDue && (
                          <span className="inline-flex items-center gap-1.5 text-[10px] font-bold bg-amber-50 text-amber-700 border border-amber-100 px-2.5 py-1 rounded-md">
                            <Icon name="bell" className="w-3.5 h-3.5" />

                      {/* Resumo Gestora */}

            <div className="bg-slate-50 border border-slate-200 rounded-2xl p-12 text-center text-slate-500 max-w-lg mx-auto">
              <Icon name="target" className="w-12 h-12 mx-auto text-slate-700 mb-3" />

    // Componente Visão de Projetos
    function ProjectView({ demands, onSelectDemand }) {
      const [expandedProjects, setExpandedProjects] = useState({});
      const [isGenerating, setIsGenerating] = useState(false);
      const [reportData, setReportData] = useState('');
      const [reportModalOpen, setReportModalOpen] = useState(false);
      const [selectedProjectForReport, setSelectedProjectForReport] = useState('');
      const [copied, setCopied] = useState(false);
      const [generatedAt, setGeneratedAt] = useState('');
      const [currentProjectDemands, setCurrentProjectDemands] = useState([]);

      const handleGenerateReport = async (e, projDemands, projectName, force = false) => {
        if (e) e.stopPropagation();
        setIsGenerating(true);
        setSelectedProjectForReport(projectName);
        setCurrentProjectDemands(projDemands);
        setReportModalOpen(true);
        setCopied(false);
        if (force) {
          setReportData('');
        }

        try {
          const demandIds = projDemands.map(d => d.externalId);
          const res = await fetch('/api/projects/summary', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              project_name: projectName,
              demand_ids: demandIds,
              force_refresh: force
            })
          });
          if (res.ok) {
            const data = await res.json();
            setReportData(data.report);
            setGeneratedAt(data.generated_at || '');
          } else {
            const errData = await res.json();
            setReportData(`Erro: ${errData.detail || "Não foi possível gerar o relatório de status."}`);
            setGeneratedAt('');
          }
        } catch (err) {
          console.error(err);
          setReportData("Erro de conexão ao tentar gerar o status report.");
          setGeneratedAt('');
        } finally {
          setIsGenerating(false);
        }
      };

      const handleCopyReport = async () => {
        try {
          await navigator.clipboard.writeText(reportData);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error("Falha ao copiar:", err);
        }
      };

      const getProjectName = (tag) => {
        const cleanTag = tag.trim().toLowerCase();
        if (cleanTag.startsWith('projeto:')) {
          return cleanTag.substring(8).trim();
        }
        if (cleanTag.startsWith('projeto-')) {
          return cleanTag.substring(8).trim();
        }
        return null;
      };

      const capitalize = (str) => {
        if (!str) return '';
        return str.split(/[\s-_]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      };

      const projectsMap = {};
      demands.forEach(d => {
        if (d.tags && d.tags.length > 0) {
          d.tags.forEach(tag => {
            const projName = getProjectName(tag);
            if (projName) {
              const capitalizedProjName = capitalize(projName);
              if (!projectsMap[capitalizedProjName]) {
                projectsMap[capitalizedProjName] = [];
              }
              if (!projectsMap[capitalizedProjName].some(existing => existing.externalId === d.externalId)) {
                projectsMap[capitalizedProjName].push(d);
              }
            }
          });
        }
      });

      const toggleProject = (projectName) => {
        setExpandedProjects(prev => ({
          ...prev,
          [projectName]: !prev[projectName]
        }));
      };

      const projectNames = Object.keys(projectsMap).sort();

      return (
        <div className="space-y-6 flex-1 overflow-y-auto w-full px-4 py-4 sm:px-6 lg:px-8 xl:px-12 sm:py-6">
          <div>
            <h2 className="text-2xl font-bold text-sicoob-text tracking-tight flex items-center gap-2.5">
              <Icon name="layers" className="w-6 h-6 text-sicoob-primary" />
              Visão de Projetos
            </h2>
            <p className="text-sm text-slate-500">Agrupamento cruzado por iniciativa/projeto com mapeamento visual de dependências</p>
          </div>

          {projectNames.length > 0 ? (
            <div className="space-y-4">
              {projectNames.map(projName => {
                const projDemands = projectsMap[projName];
                const isExpanded = expandedProjects[projName] !== false;
                const azureDemands = projDemands.filter(d => d.origin === 'Azure');
                const jiraDemands = projDemands.filter(d => d.origin === 'Jira');

                return (
                  <div 
                    key={projName}
                    className="bg-slate-50 border border-slate-200 rounded-2xl overflow-hidden backdrop-blur-md transition-all duration-300"
                  >
                    <div
                      onClick={() => toggleProject(projName)}
                      className="w-full flex items-center justify-between px-6 py-4 hover:bg-white text-left transition-colors cursor-pointer select-none"
                    >
                      <div className="flex items-center gap-3">
                        <span className="w-3 h-3 rounded-full bg-gradient-to-tr from-brand-500 to-indigo-400" />
                        <div>
                          <h3 className="text-base font-bold text-sicoob-text">{projName}</h3>
                          <span className="text-xs text-slate-500 font-medium">
                            {projDemands.length} {projDemands.length === 1 ? 'demanda associada' : 'demandas associadas'}
                          </span>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        {projDemands.length > 0 && (
                          <button
                            onClick={(e) => handleGenerateReport(e, projDemands, projName)}
                            className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold bg-sicoob-primary/10 text-sicoob-primary hover:bg-sicoob-secondary/20 border border-sicoob-primary/20 rounded-xl transition-all"
                            title="Gerar Status Report Executivo"
                          >
                            <Icon name="sparkles" className="w-3.5 h-3.5" />
                            Ver Status Report
                          </button>
                        )}
                        <span className="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-medium">
                          MAG TI: {azureDemands.length} | Sicoob TI: {jiraDemands.length}
                        </span>
                        {isExpanded ? (
                          <Icon name="chevron-up" className="w-4 h-4 text-slate-500" />
                        ) : (
                          <Icon name="chevron-down" className="w-4 h-4 text-slate-500" />
                        )}
                      </div>
                    </div>

                    {isExpanded && (
                      <div className="border-t border-slate-200 p-6 bg-white/20">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                          {/* Coluna Azure DevOps */}
                          <div className="space-y-4">
                            <div className="flex items-center justify-between border-b border-slate-200 pb-2">
                              <h4 className="text-xs font-bold text-emerald-400 uppercase tracking-widest flex items-center gap-2">
                                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500" />
                                MAG TI (Azure DevOps)
                              </h4>
                              <span className="text-[10px] text-slate-500 font-bold">{azureDemands.length} itens</span>
                            </div>

                            <div className="space-y-3">
                              {azureDemands.length > 0 ? (
                                azureDemands.map(demand => (
                                  <DemandProjectCard
                                    key={demand.externalId}
                                    demand={demand}
                                    onSelect={onSelectDemand}
                                  />
                                ))
                              ) : (
                                <div className="text-center py-8 border border-dashed border-slate-200 rounded-xl text-slate-600 text-xs">
                                  Nenhuma demanda da MAG TI (Azure DevOps) neste projeto.
                                </div>
                              )}
                            </div>
                          </div>

                          {/* Coluna Jira */}
                          <div className="space-y-4">
                            <div className="flex items-center justify-between border-b border-slate-200 pb-2">
                              <h4 className="text-xs font-bold text-sky-400 uppercase tracking-widest flex items-center gap-2">
                                <span className="w-2.5 h-2.5 rounded-full bg-sky-400" />
                                Sicoob TI (Jira)
                              </h4>
                              <span className="text-[10px] text-slate-500 font-bold">{jiraDemands.length} itens</span>
                            </div>

                            <div className="space-y-3">
                              {jiraDemands.length > 0 ? (
                                jiraDemands.map(demand => (
                                  <DemandProjectCard
                                    key={demand.externalId}
                                    demand={demand}
                                    onSelect={onSelectDemand}
                                  />
                                ))
                              ) : (
                                <div className="text-center py-8 border border-dashed border-slate-200 rounded-xl text-slate-600 text-xs">
                                  Nenhuma demanda do Sicoob TI (Jira) neste projeto.
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="text-center py-20 border border-dashed border-slate-200 rounded-3xl text-slate-500 flex flex-col items-center justify-center gap-3">
              <Icon name="layers" className="w-12 h-12 text-slate-700" />
              <div>
                <p className="text-sm font-semibold text-slate-500">Nenhum projeto encontrado</p>
                <p className="text-xs text-slate-500 mt-1">
                  Adicione tags no formato <code className="bg-white px-1 py-0.5 rounded text-sicoob-primary">projeto: nome</code> ou <code className="bg-white px-1 py-0.5 rounded text-sicoob-primary">projeto-nome</code> nas demandas para criar grupos.
                </p>
              </div>
            </div>
          )}

          {/* Modal de Status Report */}
          {reportModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/75 backdrop-blur-sm">
              <div className="bg-white border border-slate-200 rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                {/* Header */}
                <div className="flex items-center justify-between p-6 border-b border-slate-200">
                  <div className="flex flex-col">
                    <div className="flex items-center gap-2">
                      <Icon name="sparkles" className="w-5 h-5 text-sicoob-primary" />
                      <h3 className="font-bold text-lg text-sicoob-text">Status Report: {selectedProjectForReport}</h3>
                    </div>
                    {generatedAt && (
                      <span className="text-[10px] text-slate-500 font-medium mt-1">
                        Última atualização: {generatedAt}
                      </span>
                    )}
                  </div>
                  <button
                    onClick={() => setReportModalOpen(false)}
                    className="p-1.5 rounded-lg text-slate-500 hover:text-sicoob-text hover:bg-slate-100 transition-colors"
                  >
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>
                
                {/* Content */}
                <div className="p-6 overflow-y-auto space-y-4 flex-1 custom-scrollbar text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">
                  {isGenerating ? (
                    <div className="flex flex-col items-center justify-center py-12 space-y-3">
                      <div className="w-8 h-8 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
                      <p className="text-slate-500 text-xs font-semibold animate-pulse">Inteligência Artificial gerando relatório executivo...</p>
                    </div>
                  ) : (
                    reportData

                {/* Footer */}
                {!isGenerating && (
                  <div className="p-6 border-t border-slate-200 bg-white/40 flex items-center justify-between gap-4">
                    <div className="flex items-center gap-2">
                      <button
                        onClick={handleCopyReport}
                        disabled={!reportData || reportData.startsWith('Erro:')}

    // RoadmapGraphView Component
    const nodeWidth = 200;
    const nodeHeight = 85;

    // Custom Node Component
    const DemandNode = ({ data }) => {
      const origin = data.origin;
      let borderColor = 'border-emerald-500';
      let badgeColor = 'bg-emerald-50 text-emerald-700 border border-emerald-100';

      if (origin === 'Jira') {

        badgeColor = 'bg-sky-500/10 text-sky-400 border-sky-500/20';
      } else if (origin === 'Negocio') {
