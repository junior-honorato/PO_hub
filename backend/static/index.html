        badgeColor = 'bg-purple-500/10 text-purple-400 border-purple-500/20';
      }

      return (
        <div className={`p-3 bg-white border ${borderColor} rounded-xl shadow-lg w-[200px] text-xs font-sans`}>
          <Handle type="target" position={Position.Top} style={{ background: '#555' }} />
          <Handle type="target" position={Position.Left} id="left" style={{ background: '#555' }} />
          
          <div className="flex justify-between items-center mb-1">
            <span className="font-bold text-slate-500 tracking-wider uppercase text-[9px]">{data.externalId}</span>
            <span className={`px-1.5 py-0.5 rounded text-[8px] font-semibold border ${badgeColor}`}>
              {data.origin}
            </span>
          </div>
          
          <p className="font-semibold text-sicoob-text truncate mb-1" title={data.title}>
            {data.title}
          </p>
          
          <div className="flex items-center justify-between text-[10px] text-slate-500">
            <span className="truncate max-w-[120px] font-semibold text-slate-600">{data.externalStatus}</span>
          </div>

          <Handle type="source" position={Position.Bottom} style={{ background: '#555' }} />
          <Handle type="source" position={Position.Right} id="right" style={{ background: '#555' }} />
        </div>
      );
    };

    const nodeTypes = {
      demandNode: DemandNode,
    };

    const getLayoutedElements = (nodes, edges, direction = 'TB') => {
      const isHorizontal = direction === 'LR';
      const dagreGraph = new dagre.graphlib.Graph();
      dagreGraph.setDefaultEdgeLabel(() => ({}));
      dagreGraph.setGraph({ rankdir: direction });

      nodes.forEach((node) => {
        dagreGraph.setNode(node.id, { width: nodeWidth, height: nodeHeight });
      });

      edges.forEach((edge) => {
        dagreGraph.setEdge(edge.source, edge.target);
      });

      dagre.layout(dagreGraph);

      nodes.forEach((node) => {
        const nodeWithPosition = dagreGraph.node(node.id);
        node.targetPosition = isHorizontal ? Position.Left : Position.Top;
        node.sourcePosition = isHorizontal ? Position.Right : Position.Bottom;

        node.position = {
          x: nodeWithPosition.x - nodeWidth / 2,
          y: nodeWithPosition.y - nodeHeight / 2,
        };
      });

      return { nodes, edges };
    };

    function RoadmapGraphView({ demands, onSelectDemand }) {
      const [nodes, setNodes, onNodesChange] = useNodesState([]);
      const [edges, setEdges, onEdgesChange] = useEdgesState([]);
      const [direction, setDirection] = useState('TB');

      useEffect(() => {
        if (!demands || demands.length === 0) {
          setNodes([]);
          setEdges([]);
          return;
        }

        // Filter out Bug and Incident / Incidente items (operational demands)
        const filteredDemands = demands.filter((d) => {
          if (!d) return false;
          const typeField = (d.type || d.issueType || d.itemType || '').toLowerCase();
          if (typeField === 'bug' || typeField === 'incident' || typeField === 'incidente') {
            return false;
          }
          if (d.title && typeof d.title === 'string') {
            const titleLower = d.title.toLowerCase();
            if (
              titleLower.startsWith('bug:') ||
              titleLower.startsWith('incidente:') ||
              titleLower.startsWith('incident:')
            ) {
              return false;
            }
          }
          return true;
        });

        // 1. Identify which demands have active parent-child or blocker/blocked relationship
        const parentIds = new Set(filteredDemands.map(d => d.parentId).filter(Boolean));
        const blockerIds = new Set();
        filteredDemands.forEach(d => {
          if (d.blockers && Array.isArray(d.blockers)) {
            d.blockers.forEach(b => blockerIds.add(b));
          }
        });

        const connectedDemands = filteredDemands.filter((d) => {
          const hasParent = !!d.parentId && filteredDemands.some(p => p.externalId === d.parentId);
          const isParent = parentIds.has(d.externalId);
          const hasBlockers = !!d.blockers && Array.isArray(d.blockers) && d.blockers.some(b => filteredDemands.some(p => p.externalId === b));
          const isBlocker = blockerIds.has(d.externalId);
          return hasParent || isParent || hasBlockers || isBlocker;
        });

        if (connectedDemands.length === 0) {
          setNodes([]);
          setEdges([]);
          return;
        }

        // 2. Create nodes
        const initialNodes = connectedDemands.map((d) => ({
          id: d.externalId,
          type: 'demandNode',
          data: {
            externalId: d.externalId,
            origin: d.origin,
            title: d.title,
            externalStatus: d.externalStatus,
          },
          position: { x: 0, y: 0 },
        }));

        // 3. Create edges (Hierarchy + Blockers)
        const initialEdges = [];

        connectedDemands.forEach((d) => {
          // Hierarchy Edge: parentId -> id
          if (d.parentId) {
            const parentExists = connectedDemands.some((p) => p.externalId === d.parentId);
            if (parentExists) {
              initialEdges.push({
                id: `h-${d.parentId}-${d.externalId}`,
                source: d.parentId,
                target: d.externalId,
                style: { stroke: '#64748b', strokeWidth: 2 },
                markerEnd: {
                  type: MarkerType.ArrowClosed,
                  color: '#64748b',
                },
              });
            }
          }

          // Blocker Edge: blockerId -> id
          if (d.blockers && Array.isArray(d.blockers)) {
            d.blockers.forEach((blockerId) => {
              const blockerExists = connectedDemands.some((b) => b.externalId === blockerId);
              if (blockerExists) {
                initialEdges.push({
                  id: `b-${blockerId}-${d.externalId}`,
                  source: blockerId,
                  target: d.externalId,
                  animated: true,
                  style: { stroke: '#ef4444', strokeWidth: 2, strokeDasharray: '5,5' },
                  markerEnd: {
                    type: MarkerType.ArrowClosed,
                    color: '#ef4444',
                  },
                });
              }
            });
          }
        });

        // 4. Compute layout
        const { nodes: layoutedNodes, edges: layoutedEdges } = getLayoutedElements(
          initialNodes,
          initialEdges,
          direction
        );

        setNodes(layoutedNodes);
        setEdges(layoutedEdges);
      }, [demands, direction]);

      const onNodeClick = (event, node) => {
        if (onSelectDemand) {
          onSelectDemand(node.id);
        }
      };

      return (
        <div className="flex-1 flex flex-col h-full bg-sicoob-bg text-sicoob-text overflow-hidden relative">
          <div className="px-4 py-4 sm:px-6 lg:px-8 xl:px-12 sm:py-6 border-b border-slate-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 z-10 bg-white/80 backdrop-blur-md">
            <div>
              <h2 className="text-2xl font-bold text-sicoob-text tracking-tight flex items-center gap-2">
                <Icon name="network" className="w-6 h-6 text-sicoob-primary" /> Mapa do Roadmap
              </h2>
              <p className="text-sm text-slate-500">Relações de hierarquia (cinza) e bloqueios ativos (vermelho animado)</p>
            </div>
            
            <div className="flex items-center gap-2 bg-white p-1 rounded-xl border border-slate-200">
              <button
                onClick={() => setDirection('TB')}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                  direction === 'TB' ? 'bg-sicoob-primary text-white shadow-md' : 'text-slate-500 hover:text-white'
                }`}
              >
                Vertical (Árvore)
              </button>
              <button
                onClick={() => setDirection('LR')}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
                  direction === 'LR' ? 'bg-sicoob-primary text-white shadow-md' : 'text-slate-500 hover:text-white'
                }`}
              >
                Horizontal
              </button>
            </div>
          </div>

          <div className="flex-1 w-full h-full relative min-h-[500px]">
            {!demands || demands.length === 0 ? (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-500 gap-2">
                <Icon name="refresh-cw" className="w-8 h-8 animate-spin text-sicoob-primary" />
                Carregando mapa de dependências...
              </div>
            ) : nodes.length > 0 ? (
              <ReactFlowComponent
                nodes={nodes}
                edges={edges}
                onNodesChange={onNodesChange}
                onEdgesChange={onEdgesChange}
                nodeTypes={nodeTypes}
                onNodeClick={onNodeClick}
                fitView
                className="w-full h-full"
              >
                <Background color="#1e293b" gap={16} size={1} />
                <Controls className="react-flow__controls bg-white border border-slate-200 text-slate-500 fill-slate-400 rounded-lg p-1 [&>button]:border-slate-200 hover:[&>button]:bg-slate-100 hover:[&>button]:text-white" />
              </ReactFlowComponent>
            ) : (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
                <div className="w-16 h-16 bg-white border border-slate-200 rounded-2xl flex items-center justify-center text-slate-500 mb-4">
                  <Icon name="network" className="w-8 h-8 text-sicoob-primary" />
                </div>
                <h3 className="text-lg font-bold text-sicoob-text mb-2">Nenhum vínculo estabelecido</h3>
                <p className="text-sm text-slate-500 max-w-md">
                  O Mapa do Roadmap está vazio porque não existem dependências manuais ativas. 
                  Vincule um Item Pai ou adicione Bloqueadores no painel de detalhes de qualquer demanda para vê-las aqui.
                </p>
              </div>
            )}
          </div>
        </div>
      );
    }

        fetchProjects();
      }, []);

      const fetchProjects = async () => {
        setLoading(true);

        setErrorMsg('');
        if (project) {
          setEditingProject(project);
          setName(project.name);
          setSponsor(project.sponsor || '');
          setTargetGoLive(project.target_go_live || '');
          setHealthStatus(project.health_status || 'Verde');
          setProgress(project.progress || 0);
          setExecutiveSummary(project.executive_summary || '');

          setEditingProject(null);

          setTargetGoLive('');

          name: name.trim(),
          sponsor: sponsor.trim() || null,

          health_status: healthStatus,
          progress: parseInt(progress, 10),
          executive_summary: executiveSummary.trim() || null

          let url = '/api/projects';
          let method = 'POST';

          if (editingProject) {
            url = `/api/projects/${editingProject.id}`;
            method = 'PUT';

          const res = await fetch(url, {

    // Componente ProjectOverview (Visão Geral de Detalhe)
    function ProjectOverview({ projectId, onBack, onSelectDemand }) {
      const cleanTitle = (title, extId) => {
        let clean = title || '';
        clean = clean.replace(/^\[[A-Za-z0-9_-]+\]\s*/i, '');
        if (extId) {
          const escapedId = extId.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
          const regex = new RegExp(`^${escapedId}[:\\s-]*`, 'i');
          clean = clean.replace(regex, '');
        }
        return clean.trim();
      };

      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const [activeTab, setActiveTab] = useState('operational'); // 'operational', 'report_tech', or 'report_biz'
      const [isPresentationMode, setIsPresentationMode] = useState(false);

      const [editSummary, setEditSummary] = useState(false);
      const [summaryValue, setSummaryValue] = useState('');
      const [editNotes, setEditNotes] = useState(false);
      const [notesValue, setNotesValue] = useState('');
      const [saving, setSaving] = useState(false);

      const fetchOverview = async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`/api/projects/${projectId}/overview`);
          if (res.ok) {
            const result = await res.json();
            setData(result);
            setSummaryValue(result.project.executive_summary || '');
            setNotesValue(result.project.strategic_notes || '');
          } else {
            const err = await res.json();
            setError(err.detail || 'Erro ao carregar a visão geral do projeto.');
          }
        } catch (e) {
          console.error(e);
          setError('Erro de conexão ao carregar os dados.');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        if (projectId) {
          fetchOverview();
        }
      }, [projectId]);

      // Handle ESC key to exit Presentation Mode
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') {
            setIsPresentationMode(false);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
        };
      }, []);

      // Handle DOM side effects for Presentation Mode
      useEffect(() => {
        if (isPresentationMode) {
          document.body.classList.add('presentation-mode');
        } else {
          document.body.classList.remove('presentation-mode');
        }
        return () => {
          document.body.classList.remove('presentation-mode');
        };

      const handleSaveSummary = async () => {

            setData(prev => ({ ...prev, project: { ...prev.project, executive_summary: updated.executive_summary } }));

          row1 += `<td rowspan="${N}">${escapeHtml(impedimentsText).replace(/\n/g, '<br>')}</td>`;

          // Rows 2 to N
          for (let i = 1; i < childrenList.length; i++) {

            rowI += `<td>${escapeHtml(`[${childrenList[i].externalId}] ${childrenList[i].title}`)}</td>`;
            rowI += `<td>${escapeHtml(childrenList[i].externalStatus || '-')}</td>`;

            rowsHtmlArray.push(rowI);

        };

        if (activeTab === 'report_tech') {
          techEpics.forEach((epic, index) => {
            const children = epicMap[epic.externalId] || [];
            const visibleChildren = children.filter(shouldShowInExecutiveReport);

            const statusNotesList = [];
            if (epic.current_status_notes?.trim()) {
              statusNotesList.push({ id: epic.externalId, text: epic.current_status_notes.trim() });

            visibleChildren.forEach(c => {
              if (c.current_status_notes?.trim()) {

            const impedimentsList = [];
            if (shouldShowInExecutiveReport(epic)) {
              if (epic.blocker_notes?.trim()) {
                impedimentsList.push({ id: epic.externalId, text: epic.blocker_notes.trim() });
              }
              if (isDemandBlocked(epic)) {
                let bList = epic.blockers;
                if (typeof bList === 'string') {
                  try { bList = JSON.parse(bList); } catch(e) { bList = []; }
                }
                const bStr = (Array.isArray(bList) && bList.length > 0) ? bList.join(', ') : '';
                const bMsg = bStr ? `Bloqueado por: ${bStr}` : `Bloqueado (Status: ${epic.externalStatus})`;
                impedimentsList.push({ id: epic.externalId, text: bMsg });
              }
            }
            visibleChildren.forEach(c => {
              if (c.blocker_notes?.trim()) {
                impedimentsList.push({ id: c.externalId, text: c.blocker_notes.trim() });
              }
              if (isDemandBlocked(c)) {
                let bList = c.blockers;
                if (typeof bList === 'string') {
                  try { bList = JSON.parse(bList); } catch(e) { bList = []; }
                }
                const bStr = (Array.isArray(bList) && bList.length > 0) ? bList.join(', ') : '';

            addGroupToRows(colEpic, colEpicStatus, visibleChildren, colStatus, colImpediments, index);

          // Standalone demands

          if (visibleStandalone.length > 0) {

              <tbody>
                ${rowsHtml}

        `;

        const cleanProjName = project.name.replace(/[^a-zA-Z0-9]/g, '_');

        const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      if (loading) {

          <div className="flex-1 flex flex-col items-center justify-center py-20 text-slate-500 gap-2">

      if (error) {

            <button
              onClick={onBack}
              className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-50 hover:text-sicoob-text transition-all shadow-sm"
            >
              <Icon name="arrow-left" className="w-4 h-4" /> Voltar ao Portfólio
            </button>
          </div>
        );
      }

      if (!data) return null;

      const { project, demands } = data;

      // Filtragem das demandas por origem (para Gestão Operacional)
      const jiraDemands = demands.filter(d => d.origin === 'Jira');
      const azureDemands = demands.filter(d => d.origin === 'Azure');
      const businessDemands = demands.filter(d => d.origin === 'Negocio');

      const isDemandBlocked = (d) => (d.externalStatus && d.externalStatus.toLowerCase() === 'blocked') || (d.blockers && d.blockers.length > 0);
      const jiraBlockedCount = jiraDemands.filter(isDemandBlocked).length;
      const azureBlockedCount = azureDemands.filter(isDemandBlocked).length;
      const businessBlockedCount = businessDemands.filter(isDemandBlocked).length;

      const CATEGORIES = ['Backlog', 'Em Refinamento', 'Desenvolvimento', 'Homologação', 'Entregue'];

      const renderColumnDemands = (columnDemands, emptyText) => {
        if (columnDemands.length === 0) {
          return <EmptyColumnPlaceholder text={emptyText} />;
        }
        return (
          <div className="space-y-4">
            {CATEGORIES.map(category => {
              const catDemands = columnDemands.filter(d => (d.mappedStatus || 'Backlog') === category);
              if (catDemands.length === 0) return null;
              return (
                <div key={category} className="space-y-2">
                  <div className="flex items-center gap-1.5 px-2 py-1 bg-white/45 rounded-lg border border-slate-200/50 text-[9px] font-extrabold uppercase tracking-wider text-slate-500 select-none">
                    <span className={`w-1.5 h-1.5 rounded-full ${
                      category === 'Backlog' ? 'bg-slate-500' :
                      category === 'Em Refinamento' ? 'bg-purple-400' :
                      category === 'Desenvolvimento' ? 'bg-amber-400' :
                      category === 'Homologação' ? 'bg-blue-400' :
                      'bg-emerald-400'
                    }`} />
                    {category} ({catDemands.length})
                  </div>
                  <div className="space-y-2">
                    {catDemands.map(d => (
                      <DemandCard key={d.externalId} demand={d} onSelect={onSelectDemand} />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      // Helpers para o Report Executivo
      const isInProgress = (status) => {
        if (!status) return false;
        const s = status.trim().toLowerCase();
        // Resolved é considerado ainda em andamento. Closed é que a demanda foi efetivamente concluída.
        const inactive = [
          'concluído', 'concluido', 'done', 'closed', 'fechado',
          'backlog', 'a fazer', 'to do', 'removed', 'removido', 'cancelado', 'canceled'
        ];
        return !inactive.includes(s);
      };

      const shouldShowInExecutiveReport = (d) => {
        if (!d) return false;
        if (d.itemType?.toLowerCase() === 'legend') return false;

        const hasBlockerReport = !!(d.blocker_notes && d.blocker_notes.trim() !== '');
        const isBlocked = (d.externalStatus && d.externalStatus.toLowerCase() === 'blocked') || (d.blockers && d.blockers.length > 0);
        const mapped = d.mappedStatus || 'Backlog';

        // Novo: Se tiver bloqueador cadastrado no sistema, sempre exibe independente do status
        if (isBlocked) return true;

        // Se tiver impedimento preenchido, sempre aparece
        if (hasBlockerReport) return true;

        // Jamais deve aparecer demandas que são "Backlog", "Em Refinamento" e "Entregue" (se não tiverem impedimento ou bloqueio)
        if (mapped === 'Backlog' || mapped === 'Em Refinamento' || mapped === 'Entregue') {
          return false;
        }

        // Entende como status "ATIVO" as CATEGORIAS UNIFICADAS: "Desenvolvimento" e "Homologação"
        if (mapped === 'Desenvolvimento' || mapped === 'Homologação') {
          return true;
        }

        return false;
      };

      const formatPromisedDate = (dateStr) => {
        if (!dateStr) return '';
        try {
          const parts = dateStr.split('-');
          if (parts.length === 3) {
            const year = parts[0].substring(2); // e.g. "2026" -> "26"
            const monthIndex = parseInt(parts[1], 10) - 1;
            const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            return `${months[monthIndex]}/${year}`;
          }
        } catch (e) {
          console.error('Erro ao formatar data:', e);
        }
        return dateStr;
      };

      // Lógica de agrupamento por Epic/Eixo para Tecnologia e Negócios
      const techEpics = [];
      const techEpicMap = {};
      const bizEpicMap = {};
      const standaloneDemands = [];
      const standaloneBizDemands = [];

      const parentIds = new Set(demands.map(d => d.parentId || d.localParentId).filter(Boolean));
      const demandsMap = {};
      demands.forEach(d => {
        demandsMap[d.externalId] = d;
      });

      demands.forEach(d => {
        if (d.itemType?.toLowerCase() === 'legend') {
          return;
        }
        const isEpicType = (d.itemType === 'Epic' || d.itemType === 'Oportunidade');
        const isParentOfSomeone = parentIds.has(d.externalId);
        
        // Determine if it should be a top-level Epic row:
        let isTopLevelEpic = false;
        if (d.itemType === 'Epic') {
          isTopLevelEpic = true;
        } else if (d.itemType === 'Oportunidade') {
          // Opportunities are top-level only if they don't have an Epic as a parent
          const parentId = d.parentId || d.localParentId;
          const parentDemand = parentId ? demandsMap[parentId] : null;
          const parentIsEpic = parentDemand && parentDemand.itemType === 'Epic';
          isTopLevelEpic = !parentIsEpic;
        } else if (isParentOfSomeone) {
          // Non-Epic, non-Opportunity parents (like Legend or others)
          // are top-level if they don't have a parent that is also in the project (excluding Legend parents)
          const parentId = d.parentId || d.localParentId;
          const parentDemand = parentId ? demandsMap[parentId] : null;
          const hasParentInProject = parentDemand && parentDemand.itemType?.toLowerCase() !== 'legend';
          isTopLevelEpic = !hasParentInProject;
        }

        if (isTopLevelEpic) {
          techEpics.push(d);
          techEpicMap[d.externalId] = [];
          bizEpicMap[d.externalId] = [];
        }
      });

      demands.forEach(d => {
        if (d.itemType?.toLowerCase() === 'legend') {
          return;
        }
        if (techEpicMap[d.externalId] !== undefined) {
          return;
        }
        if (d.origin === 'Negocio') {
          const lpId = d.localParentId;
          if (lpId && lpId !== 'NONE' && bizEpicMap[lpId] !== undefined) {
            bizEpicMap[lpId].push(d);
          } else {
            standaloneBizDemands.push(d);
          }
        } else {
          const pId = d.parentId || d.localParentId;
          if (pId && techEpicMap[pId] !== undefined) {
            techEpicMap[pId].push(d);
          } else {
            standaloneDemands.push(d);
          }
        }
      });

      // Aliases para compatibilidade com o relatório de Tecnologia existente
      const epics = techEpics;
      const epicMap = techEpicMap;

      return (
        <div className={`flex-1 ${isPresentationMode ? 'fixed inset-0 z-[100] bg-white w-screen h-screen overflow-y-auto p-4 sm:p-8 lg:p-12 flex flex-col items-center justify-start' : 'overflow-y-auto w-full px-4 py-4 sm:px-6 lg:px-8 xl:px-12 sm:py-6 space-y-6'}`}>
          {isPresentationMode && (
            <style dangerouslySetInnerHTML={{ __html: `
              aside { display: none !important; }
              main { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; height: 100vh !important; }
            `}} />

                onClick={onBack}

              >
                <Icon name="arrow-left" className="w-4 h-4" /> Voltar ao Portfólio
              </button>

              <div className="flex items-center gap-2">
                {(activeTab === 'report_tech' || activeTab === 'report_biz') && (
                  <>
                    <button
                      onClick={() => setIsPresentationMode(true)}
                      className="flex items-center gap-2 px-4 py-2.5 bg-sicoob-primary hover:bg-sicoob-secondary text-white rounded-xl text-xs font-bold transition-all shadow-sm active:scale-95 select-none"
                    >
                      <Icon name="play" className="w-3.5 h-3.5 fill-current" /> Modo Apresentação
                    </button>
                    <button
                      onClick={exportToPPTX}
                      className="flex items-center gap-2 px-4 py-2.5 bg-sicoob-primary hover:bg-sicoob-secondary text-white rounded-xl text-xs font-bold transition-all shadow-sm active:scale-95 select-none"
                    >
                      <Icon name="download" className="w-3.5 h-3.5" /> Exportar PPTX
                    </button>
                    <button
                      onClick={exportToExcel}
                      className="flex items-center gap-2 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold transition-all shadow-sm active:scale-95 select-none"
                    >
                      <Icon name="download" className="w-3.5 h-3.5" /> Exportar Excel
                    </button>
                  </>

                  onClick={fetchOverview}

                  title="Atualizar dados"
                >
                  <Icon name="refresh-cw" className="w-4 h-4" />
                </button>
              </div>
            </div>
          )}

           {/* Floating Close Presentation Mode Button */}
           {isPresentationMode && (
             <div className="fixed top-6 right-6 z-50 flex items-center gap-2">
               <button
                 onClick={exportToPPTX}
                 className="px-4 py-2.5 bg-sicoob-primary hover:bg-sicoob-secondary text-white rounded-xl text-xs font-bold shadow-sm transition-all flex items-center gap-1.5 select-none"
               >
                 <Icon name="download" className="w-3.5 h-3.5" /> Exportar PPTX
               </button>
               <button
                 onClick={() => setIsPresentationMode(false)}
                 className="px-4 py-2.5 bg-white border border-slate-200 text-slate-600 hover:text-sicoob-text rounded-xl text-xs font-bold shadow-sm transition-all opacity-70 hover:opacity-100 flex items-center gap-1.5 select-none"
                 title="Pressione ESC para sair"
               >
                 <Icon name="x" className="w-4 h-4" /> Sair da Apresentação
               </button>
             </div>
           )}

          {/* Header Executivo Card (Hidden in Presentation Mode) */}
          {!isPresentationMode && (
            <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 backdrop-blur-md space-y-6">
              <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div className="space-y-1">
                  <div className="flex items-center gap-3">
                    <h2 className="text-2xl font-bold text-sicoob-text tracking-tight">{project.name}</h2>
                    <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${
                      project.health_status === 'Verde' ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' :
                      project.health_status === 'Amarelo' ? 'bg-amber-50 text-amber-700 border border-amber-100' :
                      'bg-rose-50 text-rose-700 border border-rose-100'
                    }`}>
                      <span className={`w-2 h-2 rounded-full ${
                        project.health_status === 'Verde' ? 'bg-emerald-500' :
                        project.health_status === 'Amarelo' ? 'bg-amber-500' :
                        'bg-rose-500'
                      }`} />
                      {project.health_status}
                    </span>
                  </div>
                  <p className="text-xs text-slate-500">
                    Consolidado estratégico de entregáveis e saúde semanal
                    <span className="text-[10px] text-slate-500 ml-2 italic">
                      (Farol automático baseado em blockers e prazos)
                    </span>
                  </p>

                      {/* Impedimentos */}

                        {impedimentsList.length > 0 ? (

                            {impedimentsList.map((item, idx) => (

          ) : activeTab === 'roadmap' ? (

              <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold ${

                demand.externalStatus === 'Em Progresso' || demand.externalStatus === 'Desenvolvimento' || demand.externalStatus === 'Doing' || demand.externalStatus === 'Resolved' || demand.externalStatus === 'Active' || demand.externalStatus === 'Em andamento' ? 'bg-amber-500/10 text-amber-400 border border-emerald-500/20' :
                isBlocked || demand.externalStatus === 'Blocked' ? 'bg-rose-50 text-rose-700 border border-rose-100' :

    function EmptyColumnPlaceholder({ text }) {

    // Componente PlanningView
    function PlanningView({ demands = [], onSelectDemand, onRefreshDemands }) {
      const [activeTab, setActiveTab] = useState('ranking'); // 'ranking' | 'gantt'
      const [jiraDemands, setJiraDemands] = useState([]);
      const [azureDemands, setAzureDemands] = useState([]);
      const [draggedItem, setDraggedItem] = useState(null);
      const [draggedOverIndex, setDraggedOverIndex] = useState(null);
      const [draggedColumn, setDraggedColumn] = useState(null);
      const [isSaving, setIsSaving] = useState(false);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalSearch, setModalSearch] = useState('');

      useEffect(() => {
        const tacticalDemands = demands.filter(d => Boolean(d.in_tactical_planning));
        const jira = tacticalDemands.filter(d => d.origin === 'Jira');
        const azure = tacticalDemands.filter(d => d.origin === 'Azure');

        const sortFn = (a, b) => {
          const rankA = a.priority_rank !== null && a.priority_rank !== undefined ? a.priority_rank : 999999;
          const rankB = b.priority_rank !== null && b.priority_rank !== undefined ? b.priority_rank : 999999;
          if (rankA !== rankB) return rankA - rankB;
          return new Date((b.updatedAt || '').replace(' ', 'T')) - new Date((a.updatedAt || '').replace(' ', 'T'));
        };

        setJiraDemands([...jira].sort(sortFn));
        setAzureDemands([...azure].sort(sortFn));
      }, [demands]);

      const handleDragStart = (e, item, columnOrigin, index) => {
        setDraggedItem(item);
        setDraggedColumn(columnOrigin);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', item.externalId);
      };

      const handleDragOver = (e, index, columnOrigin) => {
        e.preventDefault();
        if (draggedColumn === columnOrigin && draggedOverIndex !== index) {
          setDraggedOverIndex(index);
        }
      };

      const handleDrop = async (e, targetColumnOrigin) => {
        e.preventDefault();
        if (!draggedItem || draggedColumn !== targetColumnOrigin) {
          setDraggedItem(null);
          setDraggedOverIndex(null);
          setDraggedColumn(null);
          return;
        }

        const currentList = targetColumnOrigin === 'Jira' ? [...jiraDemands] : [...azureDemands];
        const currentIndex = currentList.findIndex(d => d.externalId === draggedItem.externalId);
        
        if (currentIndex === -1 || draggedOverIndex === null || currentIndex === draggedOverIndex) {
          setDraggedItem(null);
          setDraggedOverIndex(null);
          setDraggedColumn(null);
          return;
        }

        const newList = [...currentList];
        const [removed] = newList.splice(currentIndex, 1);
        newList.splice(draggedOverIndex, 0, removed);

        const reorderedPayload = newList.map((item, idx) => ({
          externalId: item.externalId,
          priority_rank: idx + 1
        }));

        if (targetColumnOrigin === 'Jira') {
          setJiraDemands(newList.map((item, idx) => ({ ...item, priority_rank: idx + 1 })));
        } else {
          setAzureDemands(newList.map((item, idx) => ({ ...item, priority_rank: idx + 1 })));
        }

        setDraggedItem(null);
        setDraggedOverIndex(null);
        setDraggedColumn(null);

        setIsSaving(true);
        try {
          const res = await fetch('/demands/reorder', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(reorderedPayload)
          });
          if (!res.ok) {
            await fetch('/api/demands/reorder', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(reorderedPayload)
            });
          }
          if (onRefreshDemands) onRefreshDemands();
        } catch (err) {
          console.error("Erro ao persistir nova ordem das demandas:", err);
        } finally {
          setIsSaving(false);
        }
      };

      const handleToggleTacticalStatus = async (externalId, currentStatus) => {
        const newStatus = currentStatus ? 0 : 1;
        try {
          await fetch(`/api/demands/${externalId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ in_tactical_planning: newStatus })
          });
          if (onRefreshDemands) onRefreshDemands();
        } catch (err) {
          console.error("Erro ao alterar status no planejamento tático:", err);
        }
      };

      const getSubProjectTag = (demand) => {
        if (demand.tags && demand.tags.length > 0) return demand.tags[0];
        const match = (demand.title || '').match(/^\[(.*?)\]/);
        if (match) return match[1];
        if (demand.project) return demand.project;
        return 'Geral';
      };

      const formatTitle = (title) => {
        if (!title) return '';
        return title.replace(/^\[.*?\]\s*/, '').trim();
      };

      const getTimelineMonths = () => {
        const months = [];
        const date = new Date();
        date.setDate(1);
        for (let i = 0; i < 6; i++) {
          const d = new Date(date.getFullYear(), date.getMonth() + i, 1);
          months.push(d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' }).toUpperCase());
        }
        return months;
      };

      const timelineMonths = getTimelineMonths();
      const tacticalDemandsList = demands.filter(d => Boolean(d.in_tactical_planning));

      const filteredModalDemands = demands.filter(d => {
        const query = modalSearch.toLowerCase().trim();
        if (!query) return true;
        return d.title.toLowerCase().includes(query) || d.externalId.toLowerCase().includes(query);
      });

      return (
        <div className="flex-1 overflow-y-auto w-full px-4 py-4 sm:px-6 lg:px-8 xl:px-12 sm:py-6 space-y-6">
          <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-slate-200 pb-4">
            <div>
              <h2 className="text-2xl font-bold text-sicoob-text tracking-tight flex items-center gap-2.5">
                <Icon name="layers" className="w-6 h-6 text-sicoob-primary" /> Planejamento Tático - VGBL
              </h2>
              <p className="text-sm text-slate-500">Priorização em paralelo e linha do tempo de entregas táticas selecionadas</p>
            </div>

            <div className="flex flex-wrap items-center gap-3">
              <button
                onClick={() => setIsModalOpen(true)}
                className="flex items-center gap-2 px-4 py-2 bg-sicoob-primary hover:bg-sicoob-secondary active:scale-95 text-white text-xs font-bold rounded-xl transition-all shadow-sm"
              >
                <Icon name="plus" className="w-4 h-4" />
                Incluir Demanda ({tacticalDemandsList.length})
              </button>

              <div className="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200/80 w-fit">
                <button
                  onClick={() => setActiveTab('ranking')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all ${
                    activeTab === 'ranking'
                      ? 'bg-white text-sicoob-primary shadow-xs'
                      : 'text-slate-600 hover:text-sicoob-text'
                  }`}
                >
                  <Icon name="list-ordered" className="w-4 h-4" />
                  Stack Ranking
                </button>
                <button
                  onClick={() => setActiveTab('gantt')}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all ${
                    activeTab === 'gantt'
                      ? 'bg-white text-sicoob-primary shadow-xs'
                      : 'text-slate-600 hover:text-sicoob-text'
                  }`}
                >
                  <Icon name="calendar" className="w-4 h-4" />
                  Cronograma
                </button>
              </div>
            </div>
          </div>

          {activeTab === 'ranking' && (
            <div className="space-y-4">
              <div className="flex items-center justify-between text-xs text-slate-500 bg-slate-50 border border-slate-200/80 p-3 rounded-xl">
                <span className="flex items-center gap-2 font-medium">
                  <Icon name="info" className="w-4 h-4 text-sicoob-primary shrink-0" />
                  Exibindo apenas demandas selecionadas para o Planejamento Tático. Arraste verticalmente para priorizar.
                </span>
                {isSaving && (
                  <span className="text-sicoob-primary font-bold animate-pulse text-[11px]">
                    Salvando prioridade...
                  </span>
                )}
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* Column 1: Sicoob TI (Jira) */}
                <div
                  className="bg-slate-50/70 border border-slate-200 rounded-2xl p-4 flex flex-col space-y-3 min-h-[450px]"
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={(e) => handleDrop(e, 'Jira')}
                >
                  <div className="flex items-center justify-between pb-3 border-b border-slate-200">
                    <div className="flex items-center gap-2">
                      <div className="w-3 h-3 rounded-full bg-cyan-600" />
                      <h3 className="font-bold text-sicoob-text text-sm">Sicoob TI (Jira)</h3>
                    </div>
                    <span className="text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-200 text-slate-700">
                      {jiraDemands.length} demandas
                    </span>
                  </div>

                  <div className="space-y-2.5 flex-1">
                    {jiraDemands.length === 0 ? (
                      <div className="text-center py-12 text-xs text-slate-400 italic space-y-2">
                        <p>Nenhuma demanda Jira inclusa no Planejamento Tático.</p>

                          onClick={() => setIsModalOpen(true)}
                          className="text-sicoob-primary font-bold hover:underline"
                        >
                          + Incluir demandas do Jira
                        </button>
                      </div>
                    ) : (
                      jiraDemands.map((item, index) => {
                        const isDragging = draggedItem?.externalId === item.externalId;
                        const isOver = draggedColumn === 'Jira' && draggedOverIndex === index;

                        return (
                          <div
                            key={item.externalId}
                            draggable
                            onDragStart={(e) => handleDragStart(e, item, 'Jira', index)}
                            onDragOver={(e) => handleDragOver(e, index, 'Jira')}

                            className={`bg-white border p-3.5 rounded-xl transition-all shadow-2xs hover:shadow-md cursor-grab active:cursor-grabbing flex items-center justify-between gap-3 ${
                              isDragging ? 'opacity-40 border-dashed border-sicoob-primary' :
                              isOver ? 'border-2 border-sicoob-primary scale-[1.01]' :
                              'border-slate-200 hover:border-slate-300'

                          >
                            <div className="flex items-center gap-3 min-w-0">
                              <div className="flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-sicoob-primary/10 text-sicoob-primary font-black text-sm border border-sicoob-primary/20">
                                {index + 1}º
                              </div>
                              <div className="min-w-0 space-y-0.5">
                                <div className="flex items-center gap-2">
                                  <span className="text-[11px] font-mono font-bold text-slate-500">
                                    {item.externalId}

                                  {item.externalStatus && (
                                    <span className="text-[9px] font-semibold px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 border border-slate-200">
                                      {item.externalStatus}
                                    </span>
                                  )}
                                </div>
                                <h4 className="text-xs font-semibold text-sicoob-text truncate leading-snug">
                                  {formatTitle(item.title)}
                                </h4>
                              </div>
                            </div>
                            <Icon name="grip-vertical" className="w-4 h-4 text-slate-300 shrink-0 hover:text-slate-500" />
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>

                {/* Column 2: MAG (Azure) */}
                <div
                  className="bg-slate-50/70 border border-slate-200 rounded-2xl p-4 flex flex-col space-y-3 min-h-[450px]"
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={(e) => handleDrop(e, 'Azure')}
                >
                  <div className="flex items-center justify-between pb-3 border-b border-slate-200">
                    <div className="flex items-center gap-2">

                    <span className="text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-200 text-slate-700">
                      {azureDemands.length} demandas
                    </span>
                  </div>

                    {azureDemands.length === 0 ? (

                        const isOver = draggedColumn === 'Azure' && draggedOverIndex === index;

                            onDragStart={(e) => handleDragStart(e, item, 'Azure', index)}
                            onDragOver={(e) => handleDragOver(e, index, 'Azure')}

                              isDragging ? 'opacity-40 border-dashed border-blue-500' :
                              isOver ? 'border-2 border-blue-500 scale-[1.01]' :
                              'border-slate-200 hover:border-slate-300'
                            }`}
                          >
                            <div className="flex items-center gap-3 min-w-0">
                              <div className="flex items-center justify-center shrink-0 w-8 h-8 rounded-lg bg-blue-50 text-blue-700 font-black text-sm border border-blue-200">
                                {index + 1}º
                              </div>
                              <div className="min-w-0 space-y-0.5">

                                  <span className="text-[11px] font-mono font-bold text-slate-500">

              <div className="overflow-x-auto">
                <div className="min-w-[700px]">
                  <div className="grid grid-cols-12 gap-2 pb-3 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-wider">
                    <div className="col-span-5">Demanda & Sub-Projeto</div>
                    <div className="col-span-7 grid grid-cols-6 text-center">
                      {timelineMonths.map((m, i) => (
                        <div key={i} className="border-l border-slate-100 px-1">{m}</div>
                      ))}
                    </div>
                  </div>

                  <div className="divide-y divide-slate-100">
                    {tacticalDemandsList.length === 0 ? (
                      <div className="text-center py-12 text-xs text-slate-400 italic">
                        Nenhuma demanda inclusa no cronograma tático.
                      </div>
                    ) : (
                      tacticalDemandsList.map((demand, index) => {
                        const tag = getSubProjectTag(demand);
                        const startCol = (index % 4) + 1;
                        const colSpan = Math.min(6 - startCol + 1, (index % 3) + 2);

                        return (
                          <div
                            key={demand.externalId}
                            onClick={() => onSelectDemand && onSelectDemand(demand.externalId)}
                            className="grid grid-cols-12 gap-2 py-3.5 items-center hover:bg-slate-50/80 rounded-lg transition-colors cursor-pointer px-1"
                          >
                            <div className="col-span-5 pr-3 space-y-1">
                              <div className="flex items-center gap-2 flex-wrap">
                                <span className="inline-flex items-center gap-1 text-[10px] font-extrabold px-2 py-0.5 rounded-md bg-emerald-50 text-emerald-700 border border-emerald-200">
                                  <Icon name="tag" className="w-3 h-3 text-emerald-600" />
                                  [{tag}]
                                </span>
                                <span className="text-[11px] font-mono font-bold text-slate-500">
                                  {demand.externalId}
                                </span>
                              </div>
                              <h4 className="text-xs font-semibold text-sicoob-text line-clamp-1 leading-snug">
                                {formatTitle(demand.title)}
                              </h4>
                            </div>

                            <div className="col-span-7 grid grid-cols-6 items-center relative h-8">
                              <div
                                className="h-6 rounded-lg bg-gradient-to-r from-sicoob-primary to-teal-500 text-white text-[10px] font-bold px-2.5 flex items-center justify-between shadow-xs truncate"
                                style={{
                                  gridColumnStart: startCol,
                                  gridColumnEnd: `span ${colSpan}`
                                }}
                              >
                                <span className="truncate">[{tag}] {formatTitle(demand.title)}</span>
                                <span className="text-[9px] bg-white/20 px-1.5 py-0.5 rounded text-white shrink-0 ml-1">
                                  {demand.mappedStatus || demand.externalStatus || 'Ativa'}
                                </span>
                              </div>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Modal de Inclusão Rápida no Planejamento Tático */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div
                className="fixed inset-0 bg-black/50 backdrop-blur-xs"
                onClick={() => setIsModalOpen(false)}
              />
              <div className="relative bg-white border border-slate-200 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden z-10 animate-in zoom-in-95 duration-200">
                <div className="p-4 border-b border-slate-200 flex items-center justify-between shrink-0">
                  <div>
                    <h3 className="font-bold text-sicoob-text text-base">Gerenciar Demandas do Planejamento Tático</h3>
                    <p className="text-xs text-slate-500">Marque as demandas que farão parte da visão de priorização tática</p>
                  </div>
                  <button
                    onClick={() => setIsModalOpen(false)}
                    className="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100"
                  >
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <div className="p-3 border-b border-slate-200 bg-slate-50/50">
                  <div className="relative">
                    <Icon name="search" className="w-4 h-4 absolute left-3 top-2.5 text-slate-400" />
                    <input
                      type="text"
                      placeholder="Buscar por título ou ID..."
                      value={modalSearch}
                      onChange={(e) => setModalSearch(e.target.value)}
                      className="w-full bg-white border border-slate-200 rounded-xl pl-9 pr-3 py-2 text-xs text-sicoob-text focus:outline-none focus:border-sicoob-primary"
                    />
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto p-4 divide-y divide-slate-100 space-y-1">
                  {filteredModalDemands.length === 0 ? (
                    <div className="text-center py-8 text-xs text-slate-400 italic">
                      Nenhuma demanda encontrada.
                    </div>
                  ) : (
                    filteredModalDemands.map(demand => {
                      const isChecked = Boolean(demand.in_tactical_planning);
                      return (
                        <div
                          key={demand.externalId}
                          className="py-2.5 px-2 flex items-center justify-between gap-3 hover:bg-slate-50 rounded-lg transition-colors cursor-pointer"
                          onClick={() => handleToggleTacticalStatus(demand.externalId, isChecked)}
                        >
                          <div className="flex items-center gap-3 min-w-0">
                            <input
                              type="checkbox"
                              checked={isChecked}
                              onChange={() => {}}
                              className="w-4 h-4 rounded text-sicoob-primary focus:ring-sicoob-primary cursor-pointer"
                            />
                            <div className="min-w-0">
                              <div className="flex items-center gap-2">
                                <span className="text-[11px] font-mono font-bold text-slate-500">
                                  [{demand.origin}] {demand.externalId}
                                </span>
                                {demand.externalStatus && (
                                  <span className="text-[9px] font-semibold px-1.5 py-0.5 rounded bg-slate-100 text-slate-600">
                                    {demand.externalStatus}
                                  </span>
                                )}
                              </div>
                              <h4 className="text-xs font-semibold text-sicoob-text truncate leading-snug">
                                {formatTitle(demand.title)}
                              </h4>
                            </div>
                          </div>

                          <span className={`text-[10px] font-extrabold px-2 py-0.5 rounded-full ${
                            isChecked
                              ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
                              : 'bg-slate-100 text-slate-500'
                          }`}>
                            {isChecked ? 'Incluso' : 'Fora do Tático'}
                          </span>
                        </div>
                      );
                    })
                  )}
                </div>

                <div className="p-3 border-t border-slate-200 flex justify-end">
                  <button
                    onClick={() => setIsModalOpen(false)}
                    className="px-4 py-2 bg-sicoob-primary hover:bg-sicoob-secondary text-white text-xs font-bold rounded-xl"
                  >
                    Concluir
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Componente HistoryView
    function HistoryView({ onSelectDemand }) {
      const [demands, setDemands] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        fetchHistory();
      }, []);

      const fetchHistory = async () => {
        setLoading(true);
        try {
          const res = await fetch('/api/demands/history');
          if (res.ok) {
            const data = await res.json();
            setDemands(data);
          }
        } catch (e) {
          console.error("Erro ao carregar histórico:", e);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="flex-1 overflow-y-auto w-full px-4 py-4 sm:px-6 lg:px-8 xl:px-12 sm:py-6 space-y-6">
          <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold text-sicoob-text tracking-tight flex items-center gap-2.5">
                <Icon name="history" className="w-6 h-6 text-sicoob-primary" /> Histórico de Demandas
              </h2>
              <p className="text-sm text-slate-500">Arquivo de demandas concluídas, resolvidas ou canceladas</p>
            </div>
          </div>

          {loading ? (
            <div className="flex flex-col items-center justify-center py-20 text-slate-500 gap-2">
              <Icon name="refresh-cw" className="w-8 h-8 animate-spin text-sicoob-primary" />
              <span>Carregando histórico...</span>
            </div>
          ) : demands.length > 0 ? (
            <DemandTable demands={demands} onSelectDemand={onSelectDemand} />
          ) : (
            <div className="bg-slate-50 border border-slate-200 rounded-2xl p-12 text-center text-slate-500 max-w-lg mx-auto">
              <Icon name="inbox" className="w-12 h-12 mx-auto text-slate-700 mb-3" />
              <p className="font-medium text-slate-500 text-sm">Histórico vazio</p>
              <p className="text-xs mt-1">Nenhuma demanda finalizada arquivada no banco de histórico ainda.</p>
            </div>
          )}
        </div>
      );
    }

    // Componente Container da App
    function App() {
      const [activeTab, setActiveTab] = useState('portfolio');
      const [selectedProjectId, setSelectedProjectId] = useState(null);
      const [demands, setDemands] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      const [selectedDemandId, setSelectedDemandId] = useState(null);
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [lastSyncStatus, setLastSyncStatus] = useState(null);
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      useEffect(() => {
        loadDemands();
        const savedSync = localStorage.getItem('po-hub-last-sync');
        if (savedSync) {
          try {
            const parsed = JSON.parse(savedSync);
            if (parsed.source === 'Sincronizado com dados Mockados') {
              parsed.source = '';
            }
            setLastSyncStatus(parsed);
          } catch (e) {}
        }
      }, []);

      const loadDemands = async () => {
        try {
          const res = await fetch('/api/demands');
          if (res.ok) {
            const data = await res.json();
            setDemands(data);
          }
        } catch (e) {
          console.error("Erro ao carregar demandas:", e);
        }
      };

      const handleSync = async (e) => {
        const jiraUrl = localStorage.getItem('jira_url');
        const jiraEmail = localStorage.getItem('jira_email');
        const jiraToken = localStorage.getItem('jira_token');
        const azureOrg = localStorage.getItem('azure_org');
        const azureProject = localStorage.getItem('azure_project');
        const azureToken = localStorage.getItem('azure_token');

        const hasJira = jiraUrl && jiraEmail && jiraToken;
        const hasAzure = azureOrg && azureProject && azureToken;

        if (!hasJira && !hasAzure) {
          alert('Por favor, preencha as credenciais do Sicoob TI (Jira) ou da MAG TI (Azure DevOps) no menu de Configurações antes de sincronizar.');
          return;
        }

        const force = e && e.shiftKey === true;
        console.log(force ? "Iniciando carga completa (force_refresh = true)..." : "Iniciando carga incremental...");

        setIsSyncing(true);
        try {
          const res = await fetch('/api/sync', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              jiraUrl: jiraUrl || null,
              jiraEmail: jiraEmail || null,
              jiraToken: jiraToken || null,
              azureOrg: azureOrg || null,
              azureProject: azureProject || null,
              azureToken: azureToken || null,
              force_refresh: force
            })
          });
          if (res.ok) {
            const result = await res.json();
            await loadDemands();
            
            const syncSourceMsg = (result.sources && (result.sources.jira === 'real' || result.sources.azure === 'real'))
              ? 'Conectado a APIs Reais'
              : '';

            let syncTypeDetail = '';
            if (result.sync_types && syncSourceMsg) {
              const types = [];
              if (result.sources.jira === 'real' && result.sync_types.jira) {
                types.push(`Sicoob TI (Jira): ${result.sync_types.jira === 'incremental' ? 'Delta' : 'Completa'}`);
              }
              if (result.sources.azure === 'real' && result.sync_types.azure) {
                types.push(`MAG TI (Azure): ${result.sync_types.azure === 'incremental' ? 'Delta' : 'Completa'}`);
              }
              if (types.length > 0) {
                syncTypeDetail = ` (${types.join(', ')})`;
              }
            }

            const syncInfo = {
              time: new Date().toLocaleString('pt-BR'),
              source: syncSourceMsg ? `${syncSourceMsg}${syncTypeDetail}` : ''
            };
            
            setLastSyncStatus(syncInfo);
            localStorage.setItem('po-hub-last-sync', JSON.stringify(syncInfo));

            if (result.errors && result.errors.length > 0) {
              alert(`Atenção ao Sincronizar APIs:\n\n${result.errors.join('\n\n')}`);
            }
          } else {
            const errData = await res.json().catch(() => null);
            alert((errData && errData.detail) || "Erro ao conectar às APIs. Verifique suas credenciais nas Configurações.");
          }
        } catch (e) {
          console.error("Erro na sincronização:", e);
          alert(`Falha de conexão ao sincronizar: ${e.message || 'Verifique se o backend local está rodando.'}`);
        } finally {
          setIsSyncing(false);
        }
      };

      const handleSelectDemand = (id) => {
        setSelectedDemandId(id);
        setIsDrawerOpen(true);
      };

      return (
        <div className="flex h-full overflow-hidden bg-white">
          {/* Mobile Sidebar Overlay */}
          <div className={`fixed inset-0 z-40 lg:hidden transition-all duration-300 ${isSidebarOpen ? 'visible' : 'invisible'}`}>
            {/* Backdrop */}
            <div 
              onClick={() => setIsSidebarOpen(false)}
              className={`absolute inset-0 bg-black/60 backdrop-blur-xs transition-opacity duration-300 ${isSidebarOpen ? 'opacity-100' : 'opacity-0'}`}
            />
            {/* Panel */}
            <div className={`absolute left-0 top-0 h-full w-64 shadow-2xl transition-transform duration-300 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
              <div className="absolute top-4 right-4 z-30">
                <button 
                  onClick={() => setIsSidebarOpen(false)}
                  className="p-1 rounded-lg bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-sicoob-text transition-colors"
                >
                  <Icon name="x" className="w-4 h-4" />
                </button>
              </div>
              <Sidebar
                activeTab={activeTab}
                setActiveTab={(tab) => {
                  setSelectedProjectId(null);
                  setActiveTab(tab);
                  setIsSidebarOpen(false);
                }}
                onSync={handleSync}
                isSyncing={isSyncing}
                lastSyncStatus={lastSyncStatus}
                onOpenSettings={() => {
                  setIsSettingsOpen(true);
                  setIsSidebarOpen(false);
                }}
              />
            </div>
          </div>

          {/* Desktop Sidebar */}
          <div className="hidden lg:flex h-full shrink-0">
            <Sidebar
              activeTab={activeTab}
              setActiveTab={(tab) => {
                setSelectedProjectId(null);
                setActiveTab(tab);
              }}
              onSync={handleSync}
              isSyncing={isSyncing}
              lastSyncStatus={lastSyncStatus}
              onOpenSettings={() => setIsSettingsOpen(true)}
            />
          </div>

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col overflow-hidden">
            {/* Mobile Header */}
            <header className="lg:hidden flex items-center justify-between px-4 py-3 border-b border-slate-200 bg-white">
              <div className="flex items-center gap-3">
                <button
                  onClick={() => setIsSidebarOpen(true)}
                  className="p-2 rounded-xl bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-sicoob-text active:scale-95 transition-all"
                >
                  <Icon name="menu" className="w-5 h-5" />
                </button>
                <div className="flex items-center gap-2">
                  <div className="bg-sicoob-primary p-1.5 rounded-lg text-white shadow-sm">
                    <Icon name="layout-dashboard" className="w-4 h-4" />
                  </div>
                  <span className="font-bold text-sm tracking-tight text-sicoob-text">PO Hub</span>
                </div>
              </div>
              <button
                onClick={() => setIsSettingsOpen(true)}
                className="p-2 rounded-xl bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-sicoob-text active:scale-95 transition-all"
              >
                <Icon name="settings" className="w-4 h-4" />
              </button>
            </header>

            {selectedProjectId ? (
              <ProjectOverview
                projectId={selectedProjectId}
                onBack={() => setSelectedProjectId(null)}
                onSelectDemand={handleSelectDemand}
              />
            ) : activeTab === 'portfolio' ? (
              <PortfolioView onSelectProject={setSelectedProjectId} />
            ) : activeTab === 'planning' ? (
              <PlanningView demands={demands} onSelectDemand={handleSelectDemand} onRefreshDemands={loadDemands} />
            ) : activeTab === 'one-on-one' ? (
              <ManagerSyncView demands={demands} onSelectDemand={handleSelectDemand} />
            ) : activeTab === 'history' ? (
              <HistoryView onSelectDemand={handleSelectDemand} />
            ) : (
              <div className="flex-1 overflow-y-auto w-full px-4 py-4 sm:px-6 lg:px-8 xl:px-12 sm:py-6 space-y-6">
                <div>
                  <h2 className="text-2xl font-bold text-sicoob-text tracking-tight">Demandas Sincronizadas</h2>
                  <p className="text-sm text-slate-500">Consolidado geral de itens de backlog com tags e filtros rápidos</p>
                </div>
                <DemandTable demands={demands} onSelectDemand={handleSelectDemand} onRefreshDemands={loadDemands} />
              </div>
            )}
          </main>

          {/* Slide-over Drawer */}
          <DemandDrawer
            demandId={selectedDemandId}
            isOpen={isDrawerOpen}
            onClose={() => setIsDrawerOpen(false)}
            onRefreshDemands={loadDemands}
            allDemands={demands}
          />

          {/* Settings Modal */}
          <SettingsModal
            isOpen={isSettingsOpen}
            onClose={() => setIsSettingsOpen(false)}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
