<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PO Hub - Consolidador de Backlogs</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#312e81',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Custom CSS for Scrollbars & Animations -->
  <style>
    /* Custom Scrollbar for sleek UI */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    
    /* Smooth Transitions */
    .drawer-transition {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fade-enter {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.3s forwards;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <!-- React & Babel CDNs for browser compilation -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Dagre and React Flow CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css">
  <script src="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/umd/index.js"></script>
</head>
<body class="h-full bg-slate-950 text-slate-100 font-sans antialiased overflow-hidden">
  <div id="root" class="h-full"></div>

  <!-- React code starts here -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const ReactFlowComponent = window.ReactFlow?.default || window.ReactFlow;
    const { Background, Controls, MarkerType, Position, Handle, useNodesState, useEdgesState } = window.ReactFlow || {};
    const dagre = window.dagre;

    // Componente de Ícone Lucide genérico para React (Evita DOMException do removeChild)
    function Icon({ name, className = "w-5 h-5", ...props }) {
      const ref = React.useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
          window.lucide.createIcons({
            root: ref.current
          });
        }
      }, [name, className]);
      return <span ref={ref} className="inline-flex items-center justify-center" {...props}></span>;
    }

    // Componente Sidebar
    function Sidebar({ activeTab, setActiveTab, onSync, isSyncing, lastSyncStatus }) {
      return (
        <aside className="w-64 bg-slate-950 border-r border-slate-800 flex flex-col h-full z-20">
          {/* Logo */}
          <div className="p-6 border-b border-slate-800 flex items-center gap-3">
            <div className="bg-gradient-to-tr from-brand-600 to-indigo-400 p-2 rounded-xl text-white shadow-md shadow-brand-500/20">
              <Icon name="layout-dashboard" className="w-6 h-6" />
            </div>
            <div>
              <h1 className="font-bold text-lg leading-none tracking-tight">PO Hub</h1>
              <span className="text-xs text-slate-400 font-medium">Consolidador Local</span>
            </div>
          </div>

          {/* Navegação */}
          <nav className="flex-1 px-4 py-6 space-y-1">
            <button
              onClick={() => setActiveTab('dashboard')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'dashboard'
                  ? 'bg-slate-900 text-white border-l-4 border-brand-500 shadow-sm'
                  : 'text-slate-400 hover:bg-slate-900/50 hover:text-slate-200'
              }`}
            >
              <Icon name="grid" className="w-5 h-5" />
              Dashboard
            </button>
            <button
              onClick={() => setActiveTab('demands')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'demands'
                  ? 'bg-slate-900 text-white border-l-4 border-brand-500 shadow-sm'
                  : 'text-slate-400 hover:bg-slate-900/50 hover:text-slate-200'
              }`}
            >
              <Icon name="list-todo" className="w-5 h-5" />
              Demandas
            </button>
            <button
              onClick={() => setActiveTab('projects')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'projects'
                  ? 'bg-slate-900 text-white border-l-4 border-brand-500 shadow-sm'
                  : 'text-slate-400 hover:bg-slate-900/50 hover:text-slate-200'
              }`}
            >
              <Icon name="folder-kanban" className="w-5 h-5" />
              Projetos
            </button>
            <button
              onClick={() => setActiveTab('roadmap')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'roadmap'
                  ? 'bg-slate-900 text-white border-l-4 border-brand-500 shadow-sm'
                  : 'text-slate-400 hover:bg-slate-900/50 hover:text-slate-200'
              }`}
            >
              <Icon name="network" className="w-5 h-5" />
              Mapa do Roadmap
            </button>
            <button
              onClick={() => setActiveTab('history')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'history'
                  ? 'bg-slate-900 text-white border-l-4 border-brand-500 shadow-sm'
                  : 'text-slate-400 hover:bg-slate-900/50 hover:text-slate-200'
              }`}
            >
              <Icon name="history" className="w-5 h-5" />
              Histórico
            </button>
            <button
              onClick={() => setActiveTab('one-on-one')}
              className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${
                activeTab === 'one-on-one'
                  ? 'bg-slate-900 text-white border-l-4 border-brand-500 shadow-sm'
                  : 'text-slate-400 hover:bg-slate-900/50 hover:text-slate-200'
              }`}
            >
              <Icon name="target" className="w-5 h-5" />
              Modo One-on-One
            </button>
          </nav>

          {/* Sincronização e Rodapé */}
          <div className="p-4 border-t border-slate-800 bg-slate-950/50">
            <button
              onClick={onSync}
              disabled={isSyncing}
              className={`w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-brand-600 to-indigo-500 hover:from-brand-500 hover:to-indigo-400 active:scale-95 transition-all shadow-lg shadow-brand-600/20 disabled:opacity-50 disabled:pointer-events-none`}
            >
              <Icon name="refresh-cw" className={`w-4 h-4 ${isSyncing ? 'animate-spin' : ''}`} />
              {isSyncing ? 'Sincronizando...' : 'Sincronizar APIs'}
            </button>
            
            {lastSyncStatus && (
              <div className="mt-3 text-center">
                <span className="text-[10px] text-slate-500 block">
                  Última Sync: {lastSyncStatus.time}
                </span>
                <span className="text-[10px] text-indigo-400 font-semibold mt-0.5 block">
                  {lastSyncStatus.source}
                </span>
              </div>
            )}
          </div>
        </aside>
      );
    }

    // Componente de Cards de Métricas
    function MetricCards({ demands }) {
      const total = demands.length;
      const jiraCount = demands.filter(d => d.origin === 'Jira').length;
      const azureCount = demands.filter(d => d.origin === 'Azure').length;
      const tagCount = new Set(demands.flatMap(d => d.tags)).size;

      return (
        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
          <div className="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-slate-700/80 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="layers" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total de Demandas</p>
            <h3 className="text-3xl font-bold mt-2 text-white">{total}</h3>
            <span className="text-xs text-indigo-400 mt-2 block font-medium">Consolidado local</span>
          </div>

          <div className="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-slate-700/80 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="columns" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Jira Epics</p>
            <h3 className="text-3xl font-bold mt-2 text-sky-400">{jiraCount}</h3>
            <span className="text-xs text-slate-500 mt-2 block">Originadas no Jira API</span>
          </div>

          <div className="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-slate-700/80 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="git-pull-request" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Azure DevOps Backlog</p>
            <h3 className="text-3xl font-bold mt-2 text-emerald-400">{azureCount}</h3>
            <span className="text-xs text-slate-500 mt-2 block">Histórias e bugs sincronizados</span>
          </div>

          <div className="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-5 backdrop-blur-md relative overflow-hidden group hover:border-slate-700/80 transition-all duration-300">
            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:scale-110 transition-transform duration-300">
              <Icon name="tags" className="w-24 h-24" />
            </div>
            <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Tags Customizadas</p>
            <h3 className="text-3xl font-bold mt-2 text-purple-400">{tagCount}</h3>
            <span className="text-xs text-slate-500 mt-2 block">Criadas localmente</span>
          </div>
        </div>
      );
    }

    // Componente Tabela de Demandas
    function DemandTable({ demands, onSelectDemand }) {
      const [search, setSearch] = useState('');
      const [originFilter, setOriginFilter] = useState('All');
      const [itemTypeFilter, setItemTypeFilter] = useState('All');
      const [selectedTag, setSelectedTag] = useState('');
      const [selectedStatus, setSelectedStatus] = useState([]);
      const [sortBy, setSortBy] = useState('updated-desc');
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 10;

      // Extrai todas as tags únicas
      const allTags = Array.from(new Set(demands.flatMap(d => d.tags)));
      // Extrai todos os status únicos
      const allStatuses = Array.from(new Set(demands.map(d => d.externalStatus).filter(Boolean)));
      // Extrai todos os tipos de item únicos
      const allTypes = Array.from(new Set(demands.map(d => d.itemType).filter(Boolean)));

      const handleSort = (field) => {
        if (field === 'id') {
          setSortBy(sortBy === 'id-asc' ? 'id-desc' : 'id-asc');
        } else if (field === 'title') {
          setSortBy(sortBy === 'title-asc' ? 'title-desc' : 'title-asc');
        } else if (field === 'status') {
          setSortBy(sortBy === 'status-asc' ? 'status-desc' : 'status-asc');
        }
        setCurrentPage(1);
      };

      const renderSortIcon = (field) => {
        if (field === 'id') {
          if (sortBy === 'id-asc') return <Icon name="arrow-up" className="w-3.5 h-3.5 ml-1.5" />;
          if (sortBy === 'id-desc') return <Icon name="arrow-down" className="w-3.5 h-3.5 ml-1.5" />;
        } else if (field === 'title') {
          if (sortBy === 'title-asc') return <Icon name="arrow-up" className="w-3.5 h-3.5 ml-1.5" />;
          if (sortBy === 'title-desc') return <Icon name="arrow-down" className="w-3.5 h-3.5 ml-1.5" />;
        } else if (field === 'status') {
          if (sortBy === 'status-asc') return <Icon name="arrow-up" className="w-3.5 h-3.5 ml-1.5" />;
          if (sortBy === 'status-desc') return <Icon name="arrow-down" className="w-3.5 h-3.5 ml-1.5" />;
        }
        return <Icon name="arrow-up-down" className="w-3.5 h-3.5 ml-1.5 text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity" />;
      };

      const filteredDemands = demands.filter(d => {
        const matchesSearch = d.title.toLowerCase().includes(search.toLowerCase()) || d.externalId.toLowerCase().includes(search.toLowerCase());
        const matchesOrigin = originFilter === 'All' || d.origin === originFilter;
        const matchesTag = !selectedTag || d.tags.includes(selectedTag);
        const matchesStatus = selectedStatus.length === 0 || selectedStatus.includes(d.externalStatus);
        const matchesItemType = itemTypeFilter === 'All' || d.itemType === itemTypeFilter;
        return matchesSearch && matchesOrigin && matchesTag && matchesStatus && matchesItemType;
      });

      const sortedDemands = [...filteredDemands].sort((a, b) => {
        if (sortBy === 'updated-desc') {
          return new Date(b.updatedAt.replace(' ', 'T')) - new Date(a.updatedAt.replace(' ', 'T'));
        }
        if (sortBy === 'updated-asc') {
          return new Date(a.updatedAt.replace(' ', 'T')) - new Date(b.updatedAt.replace(' ', 'T'));
        }
        if (sortBy === 'title-asc') {
          return a.title.localeCompare(b.title, 'pt-BR');
        }
        if (sortBy === 'title-desc') {
          return b.title.localeCompare(a.title, 'pt-BR');
        }
        if (sortBy === 'id-asc') {
          return a.externalId.localeCompare(b.externalId, undefined, { numeric: true, sensitivity: 'base' });
        }
        if (sortBy === 'id-desc') {
          return b.externalId.localeCompare(a.externalId, undefined, { numeric: true, sensitivity: 'base' });
        }
        if (sortBy === 'status-asc') {
          return (a.externalStatus || '').localeCompare(b.externalStatus || '', 'pt-BR');
        }
        if (sortBy === 'status-desc') {
          return (b.externalStatus || '').localeCompare(b.externalStatus || '', 'pt-BR');
        }
        return 0;
      });

      const handleSearchChange = (e) => {
        setSearch(e.target.value);
        setCurrentPage(1);
      };

      const handleOriginFilterChange = (e) => {
        setOriginFilter(e.target.value);
        setCurrentPage(1);
      };

      const handleTagFilterChange = (e) => {
        setSelectedTag(e.target.value);
        setCurrentPage(1);
      };

      const handleSortByChange = (e) => {
        setSortBy(e.target.value);
        setCurrentPage(1);
      };

      const handleClearFilters = () => {
        setSearch('');
        setOriginFilter('All');
        setItemTypeFilter('All');
        setSelectedTag('');
        setSelectedStatus([]);
        setSortBy('updated-desc');
        setCurrentPage(1);
      };

      const totalPages = Math.ceil(sortedDemands.length / itemsPerPage);
      const activePage = Math.min(Math.max(currentPage, 1), Math.max(totalPages, 1));
      const startIndex = (activePage - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const paginatedDemands = sortedDemands.slice(startIndex, endIndex);

      return (
        <div className="space-y-4">
          {/* Barra de Filtros */}
          <div className="flex flex-col gap-4 bg-slate-900/20 p-4 border border-slate-800/60 rounded-2xl backdrop-blur-sm">
            {/* Linha Principal: Pesquisa e Controles Básicos */}
            <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
              <div className="flex-1 relative w-full lg:w-auto">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                  <Icon name="search" className="w-4 h-4" />
                </div>
                <input
                  type="text"
                  placeholder="Buscar por título ou ID..."
                  value={search}
                  onChange={handleSearchChange}
                  className="w-full bg-slate-950 border border-slate-800/80 rounded-xl py-2.5 pl-10 pr-4 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-brand-500 transition-colors"
                />
              </div>
              
              <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                {/* Filtro por Origem */}
                <select
                  value={originFilter}
                  onChange={handleOriginFilterChange}
                  className="bg-slate-950 border border-slate-800/80 rounded-xl py-2 px-3 text-xs text-slate-300 focus:outline-none focus:border-brand-500"
                >
                  <option value="All">Origem</option>
                  <option value="Jira">Jira Only</option>
                  <option value="Azure">Azure DevOps</option>
                </select>

                {/* Filtro por Tipo de Item */}
                <select
                  value={itemTypeFilter}
                  onChange={(e) => { setItemTypeFilter(e.target.value); setCurrentPage(1); }}
                  className="bg-slate-950 border border-slate-800/80 rounded-xl py-2 px-3 text-xs text-slate-300 focus:outline-none focus:border-brand-500"
                >
                  <option value="All">Tipo de Item</option>
                  {allTypes.map(type => (
                    <option key={type} value={type}>{type}</option>
                  ))}
                </select>

                {/* Filtro por Tags */}
                <select
                  value={selectedTag}
                  onChange={handleTagFilterChange}
                  className="bg-slate-950 border border-slate-800/80 rounded-xl py-2 px-3 text-xs text-slate-300 focus:outline-none focus:border-brand-500"
                >
                  <option value="">Tags</option>
                  {allTags.map(tag => (
                    <option key={tag} value={tag}>{tag}</option>
                  ))}
                </select>

                {/* Ordenação */}
                <select
                  value={sortBy}
                  onChange={handleSortByChange}
                  className="bg-slate-950 border border-slate-800/80 rounded-xl py-2 px-3 text-xs text-slate-300 focus:outline-none focus:border-brand-500"
                >
                  <option value="updated-desc">Última Sync (Recente)</option>
                  <option value="updated-asc">Última Sync (Antigo)</option>
                  <option value="title-asc">Título (A-Z)</option>
                  <option value="title-desc">Título (Z-A)</option>
                  <option value="id-asc">ID (Crescente)</option>
                  <option value="id-desc">ID (Decrescente)</option>
                  <option value="status-asc">Status (A-Z)</option>
                  <option value="status-desc">Status (Z-A)</option>
                </select>

                {/* Limpar Filtros */}
                {(search || originFilter !== 'All' || itemTypeFilter !== 'All' || selectedTag || selectedStatus.length > 0 || sortBy !== 'updated-desc') && (
                  <button
                    onClick={handleClearFilters}
                    className="p-2 text-slate-400 hover:text-white bg-slate-900 rounded-xl transition-colors"
                    title="Limpar filtros"
                  >
                    <Icon name="x" className="w-4 h-4" />
                  </button>
                )}
              </div>
            </div>

            {/* Linha Secundária: Filtro de Status (Pills) */}
            <div className="flex flex-wrap items-center gap-2 border-t border-slate-800/40 pt-3">
              <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mr-1">Status:</span>
              <div className="flex flex-wrap gap-1.5">
                {allStatuses.map(status => {
                  const isActive = selectedStatus.includes(status);
                  return (
                    <button
                      key={status}
                      type="button"
                      onClick={() => {
                        if (isActive) {
                          setSelectedStatus(selectedStatus.filter(s => s !== status));
                        } else {
                          setSelectedStatus([...selectedStatus, status]);
                        }
                        setCurrentPage(1);
                      }}
                      className={`px-2.5 py-1 rounded-lg text-xs font-semibold border transition-all ${
                        isActive
                          ? 'bg-brand-500/20 text-brand-400 border-brand-500/40 hover:bg-brand-500/30'
                          : 'bg-slate-900/40 text-slate-400 border-slate-800/80 hover:text-slate-300 hover:bg-slate-800/40'
                      }`}
                    >
                      {status}
                    </button>
                  );
                })}
            </div>
          </div>
        </div>

        {/* Grid/Table Wrapper */}
        <div className="bg-slate-900/20 border border-slate-800/80 rounded-2xl overflow-hidden backdrop-blur-md">
            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="border-b border-slate-800/80 bg-slate-900/30 text-xs font-semibold text-slate-400 uppercase tracking-wider select-none">
                    <th 
                      className="px-6 py-4 cursor-pointer hover:bg-slate-800/40 transition-colors group"
                      onClick={() => handleSort('id')}
                    >
                      <div className="flex items-center">
                        ID / Origem
                        {renderSortIcon('id')}
                      </div>
                    </th>
                    <th 
                      className="px-6 py-4 cursor-pointer hover:bg-slate-800/40 transition-colors group"
                      onClick={() => handleSort('title')}
                    >
                      <div className="flex items-center">
                        Demanda
                        {renderSortIcon('title')}
                      </div>
                    </th>
                    <th 
                      className="px-6 py-4 cursor-pointer hover:bg-slate-800/40 transition-colors group"
                      onClick={() => handleSort('status')}
                    >
                      <div className="flex items-center">
                        Status Externo
                        {renderSortIcon('status')}
                      </div>
                    </th>
                    <th className="px-6 py-4">Tipo de Item</th>
                    <th className="px-6 py-4">Tags Locais</th>
                    <th className="px-6 py-4 text-right">Ação</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-800/60 text-sm text-slate-300">
                  {paginatedDemands.length > 0 ? (
                    paginatedDemands.map(demand => (
                      <tr
                        key={demand.externalId}
                        onClick={() => onSelectDemand(demand.externalId)}
                        className="hover:bg-slate-900/30 cursor-pointer transition-colors group"
                      >
                        <td className="px-6 py-4 whitespace-nowrap">
                          <div className="flex items-center gap-2.5">
                            <span className={`w-2.5 h-2.5 rounded-full ${
                              demand.origin === 'Jira' ? 'bg-sky-400' : 'bg-emerald-400'
                            }`} />
                            <div>
                              <span className="font-semibold text-white block">{demand.externalId}</span>
                              <span className="text-xs text-slate-500 block">{demand.origin}</span>
                            </div>
                          </div>
                        </td>
                        <td className="px-6 py-4 max-w-md">
                          <p className="truncate font-medium text-slate-200 group-hover:text-white transition-colors">
                            {demand.title}
                          </p>
                        </td>
                        <td className="px-6 py-4 whitespace-nowrap">
                          <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ${
                            demand.externalStatus === 'Concluído' || demand.externalStatus === 'Resolved' || demand.externalStatus === 'Done'
                              ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
                              : demand.externalStatus === 'Em Progresso' || demand.externalStatus === 'Desenvolvimento' || demand.externalStatus === 'Doing'
                              ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20'
                              : 'bg-slate-500/10 text-slate-400 border border-slate-500/20'
                          }`}>
                            {demand.externalStatus}
                          </span>
                        </td>
                        <td className="px-6 py-4 whitespace-nowrap">
                          <span className="text-xs font-semibold bg-slate-900/60 text-slate-300 border border-slate-800/80 px-2.5 py-1 rounded-lg">
                            {demand.itemType || 'Outro'}
                          </span>
                        </td>
                        <td className="px-6 py-4">
                          <div className="flex flex-wrap gap-1">
                            {demand.tags.length > 0 ? (
                              demand.tags.map(tag => (
                                <span key={tag} className="text-[10px] font-semibold bg-brand-500/10 text-brand-400 border border-brand-500/20 px-2 py-0.5 rounded-md">
                                  {tag}
                                </span>
                              ))
                            ) : (
                              <span className="text-xs text-slate-600">-</span>
                            )}
                          </div>
                        </td>
                        <td className="px-6 py-4 text-right whitespace-nowrap">
                          <button className="text-slate-400 group-hover:text-brand-400 group-hover:translate-x-1 transition-all p-1">
                            <Icon name="arrow-right" className="w-5 h-5" />
                          </button>
                        </td>
                      </tr>
                    ))
                  ) : (
                    <tr>
                      <td colSpan="6" className="text-center py-12 text-slate-500">
                        <Icon name="inbox" className="w-12 h-12 mx-auto text-slate-700 mb-3" />
                        Nenhuma demanda encontrada para os critérios selecionados.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>

            {/* Paginação */}
            {sortedDemands.length > 0 && (
              <div className="px-6 py-4 border-t border-slate-800/60 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-400 select-none bg-slate-900/10">
                <div>
                  Exibindo <span className="font-semibold text-slate-200">{Math.min(startIndex + 1, sortedDemands.length)}</span> a{' '}
                  <span className="font-semibold text-slate-200">{Math.min(endIndex, sortedDemands.length)}</span> de{' '}
                  <span className="font-semibold text-slate-200">{sortedDemands.length}</span> demandas
                </div>
                
                <div className="flex items-center gap-2">
                  <button
                    type="button"
                    disabled={activePage === 1}
                    onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))}
                    className="p-1.5 rounded-lg border border-slate-800/80 bg-slate-950 text-slate-400 hover:text-white hover:border-slate-700 disabled:opacity-40 disabled:pointer-events-none transition-all"
                  >
                    <Icon name="chevron-left" className="w-4 h-4" />
                  </button>
                  
                  <div className="flex items-center gap-1">
                    {Array.from({ length: totalPages }, (_, i) => i + 1).map(page => {
                      const isNear = Math.abs(page - activePage) <= 1;
                      const isFirstOrLast = page === 1 || page === totalPages;
                      
                      if (!isNear && !isFirstOrLast) {
                        if (page === 2 || page === totalPages - 1) {
                          return <span key={`ell-${page}`} className="px-1.5 text-slate-600">...</span>;
                        }
                        return null;
                      }
                      
                      const isCurrent = page === activePage;
                      return (
                        <button
                          key={page}
                          type="button"
                          onClick={() => setCurrentPage(page)}
                          className={`min-w-8 h-8 px-2.5 rounded-lg text-xs font-semibold border transition-all ${
                            isCurrent
                              ? 'bg-brand-500/20 text-brand-400 border-brand-500/40'
                              : 'bg-slate-950/40 text-slate-400 border-slate-800/80 hover:text-slate-300 hover:bg-slate-800/40'
                          }`}
                        >
                          {page}
                        </button>
                      );
                    })}
                  </div>
                  
                  <button
                    type="button"
                    disabled={activePage === totalPages}
                    onClick={() => setCurrentPage(prev => Math.min(prev + 1, totalPages))}
                    className="p-1.5 rounded-lg border border-slate-800/80 bg-slate-950 text-slate-400 hover:text-white hover:border-slate-700 disabled:opacity-40 disabled:pointer-events-none transition-all"
                  >
                    <Icon name="chevron-right" className="w-4 h-4" />
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Componente Slide-Over Drawer (Painel de Detalhes)
    function DemandDrawer({ demandId, isOpen, onClose, onRefreshDemands, allDemands = [] }) {
      const [demand, setDemand] = useState(null);
      const [note, setNote] = useState('');
      const [tagInput, setTagInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [summarizing, setSummarizing] = useState(false);
      const [showExternalComments, setShowExternalComments] = useState(false);
      const [parentSearchQuery, setParentSearchQuery] = useState('');
      const [isParentSearchOpen, setIsParentSearchOpen] = useState(false);
      const [blockerSearchQuery, setBlockerSearchQuery] = useState('');
      const [isBlockerSearchOpen, setIsBlockerSearchOpen] = useState(false);

      useEffect(() => {
        if (isOpen && demandId) {
          loadDemandDetail();
          setShowExternalComments(false);
        } else {
          setDemand(null);
          setShowExternalComments(false);
          setIsParentSearchOpen(false);
          setIsBlockerSearchOpen(false);
          setParentSearchQuery('');
          setBlockerSearchQuery('');
        }
      }, [demandId, isOpen]);

      const loadDemandDetail = async () => {
        setLoading(true);
        try {
          const res = await fetch(`/api/demands/${demandId}`);
          if (res.ok) {
            const data = await res.json();
            setDemand(data);
          }
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      const handleSummarize = async () => {
        if (!demandId) return;
        setSummarizing(true);
        try {
          const res = await fetch(`/api/demands/${demandId}/summarize`, {
            method: 'POST'
          });
          if (res.ok) {
            const data = await res.json();
            setDemand(prev => ({
              ...prev,
              ai_summary: data.ai_summary,
              summary_updated_at: data.summary_updated_at
            }));
            if (onRefreshDemands) {
              onRefreshDemands();
            }
          } else {
            const errData = await res.json();
            alert(errData.detail || "Erro ao gerar resumo inteligênte.");
          }
        } catch (e) {
          console.error("Erro ao resumir demanda:", e);
          alert("Erro ao conectar ao servidor para gerar o resumo.");
        } finally {
          setSummarizing(false);
        }
      };

      const handleAddNote = async (e) => {
        e.preventDefault();
        if (!note.trim()) return;

        try {
          const res = await fetch(`/api/demands/${demandId}/annotations`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: note })
          });
          if (res.ok) {
            setNote('');
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleAddTag = async (e) => {
        e.preventDefault();
        const tag = tagInput.trim().toLowerCase();
        if (!tag || demand.tags.includes(tag)) return;

        try {
          const res = await fetch(`/api/demands/${demandId}/tags`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tag })
          });
          if (res.ok) {
            setTagInput('');
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleRemoveTag = async (tag) => {
        try {
          const res = await fetch(`/api/demands/${demandId}/tags/${tag}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleUpdateManagementField = async (field, value) => {
        setDemand(prev => ({
          ...prev,
          [field]: value
        }));
        try {
          await fetch(`/api/demands/${demandId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ [field]: value || null })
          });
          onRefreshDemands();
        } catch (e) {
          console.error("Erro ao atualizar campo de gestão:", e);
        }
      };

      const handleSelectParent = async (val) => {
        await handleUpdateManagementField('localParentId', val);
        setIsParentSearchOpen(false);
        setParentSearchQuery('');
        loadDemandDetail();
      };

      const handleSelectBlocker = async (blockerId) => {
        try {
          const res = await fetch(`/api/demands/${demandId}/dependencies`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ blocker_id: blockerId })
          });
          if (res.ok) {
            setIsBlockerSearchOpen(false);
            setBlockerSearchQuery('');
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const handleRemoveBlocker = async (blockerId) => {
        try {
          const res = await fetch(`/api/demands/${demandId}/dependencies/${blockerId}`, {
            method: 'DELETE'
          });
          if (res.ok) {
            loadDemandDetail();
            onRefreshDemands();
          }
        } catch (e) {
          console.error(e);
        }
      };

      const formatDate = (isoString) => {
        if (!isoString) return '-';
        try {
          const cleanIso = isoString.replace(' ', 'T');
          const d = new Date(cleanIso.indexOf('T') !== -1 ? cleanIso : cleanIso + 'T00:00:00');
          if (isNaN(d.getTime())) {
            return isoString;
          }
          return d.toLocaleDateString('pt-BR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        } catch (e) {
          console.error("Erro ao formatar data:", e);
          return isoString;
        }
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 flex justify-end overflow-hidden">
          {/* Backdrop */}
          <div
            onClick={onClose}
            className="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-200"
          />
          
          {/* Drawer Panel */}
          <div className="relative w-full max-w-lg bg-slate-900 border-l border-slate-800 shadow-2xl flex flex-col h-full z-10">
            {/* Header */}
            <div className="p-6 border-b border-slate-800 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className={`w-2.5 h-2.5 rounded-full ${
                  demand?.origin === 'Jira' ? 'bg-sky-400' : 'bg-emerald-400'
                }`} />
                <span className="text-xs text-slate-400 uppercase tracking-widest font-semibold">
                  {demand?.origin} / {demand?.externalId}
                </span>
              </div>
              <div className="flex items-center gap-2">
                {demand?.externalUrl && (
                  <a
                    href={demand.externalUrl}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-indigo-400 hover:text-indigo-300 hover:bg-slate-800 rounded-xl transition-all"
                    title={`Ver no ${demand.origin}`}
                  >
                    <Icon name="external-link" className="w-3.5 h-3.5" />
                    Ver no {demand.origin}
                  </a>
                )}
                <button
                  onClick={onClose}
                  className="p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all"
                >
                  <Icon name="x" className="w-4 h-4" />
                </button>
              </div>
            </div>

            {loading ? (
              <div className="flex-1 flex flex-col items-center justify-center text-slate-500">
                <Icon name="refresh-cw" className="w-8 h-8 animate-spin text-brand-500 mb-2" />
                Carregando detalhes...
              </div>
            ) : demand ? (
              <div className="flex-1 overflow-y-auto p-6 space-y-6">
                
                {/* Demand Title & Status */}
                <div className="space-y-3">
                  <div className="flex items-start justify-between gap-4">
                    <h2 className="text-xl font-bold text-white leading-snug">{demand.title}</h2>
                    {demand.externalUrl && (
                      <a
                        href={demand.externalUrl}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="text-slate-400 hover:text-white transition-colors pt-1 flex-shrink-0"
                        title={`Abrir no ${demand.origin}`}
                      >
                        <Icon name="external-link" className="w-5 h-5" />
                      </a>
                    )}
                  </div>
                  <div className="flex flex-wrap items-center gap-4 text-xs text-slate-400">
                    <div className="flex items-center gap-1.5">
                      <span className="w-2 h-2 rounded-full bg-slate-500" />
                      Status: <strong className="text-slate-200">{demand.externalStatus}</strong>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <Icon name="clock" className="w-3.5 h-3.5" />
                      Última Atualização: <strong className="text-slate-200">{formatDate(demand.updatedAt)}</strong>
                    </div>
                  </div>
                </div>

                <hr className="border-slate-800" />

                {/* Tags Section */}
                <div className="space-y-3">
                  <h3 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                    <Icon name="tag" className="w-4 h-4" /> Tags Customizadas
                  </h3>
                  <div className="flex flex-wrap gap-1.5 items-center">
                    {demand.tags.map(tag => (
                      <span
                        key={tag}
                        className="inline-flex items-center gap-1 text-xs font-semibold bg-brand-500/10 text-brand-400 border border-brand-500/20 pl-2.5 pr-1 py-1 rounded-lg group"
                      >
                        {tag}
                        <button
                          onClick={() => handleRemoveTag(tag)}
                          className="p-0.5 rounded text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-colors"
                        >
                          <Icon name="x" className="w-3.5 h-3.5" />
                        </button>
                      </span>
                    ))}
                    
                    {/* Add Tag Form */}
                    <form onSubmit={handleAddTag} className="inline-flex items-center ml-1">
                      <input
                        type="text"
                        placeholder="+ Nova tag"
                        value={tagInput}
                        onChange={e => setTagInput(e.target.value)}
                        className="bg-slate-950 border border-slate-800/80 hover:border-slate-700 text-xs text-slate-300 placeholder-slate-600 rounded-lg px-2.5 py-1 focus:outline-none focus:border-brand-500 w-24 transition-colors"
                      />
                    </form>
                  </div>
                </div>

                <hr className="border-slate-800" />

                {/* Controle de Prazos e Cobrança */}
                <div className="space-y-4">
                  <h3 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                    <Icon name="calendar" className="w-4 h-4" /> Controle de Prazos e Cobrança
                  </h3>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1.5">
                      <label className="text-xs text-slate-400 font-medium">Promessa de Entrega</label>
                      <input
                        type="date"
                        value={demand.promisedDate || ''}
                        onChange={e => handleUpdateManagementField('promisedDate', e.target.value)}
                        className="w-full bg-slate-950 border border-slate-800/80 rounded-xl px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-brand-500 transition-colors"
                      />
                    </div>
                    <div className="space-y-1.5">
                      <label className="text-xs text-slate-400 font-medium">Agendar Próxima Cobrança</label>
                      <input
                        type="date"
                        value={demand.followUpDate || ''}
                        onChange={e => handleUpdateManagementField('followUpDate', e.target.value)}
                        className="w-full bg-slate-950 border border-slate-800/80 rounded-xl px-3 py-2 text-xs text-slate-300 focus:outline-none focus:border-brand-500 transition-colors"
                      />
                    </div>
                  </div>

                  <div className="space-y-1.5">
                    <label className="text-xs text-slate-400 font-medium">Resumo para a Gestora (One-on-One)</label>
                    <textarea
                      placeholder="Pontos críticos, alinhamentos informais ou notas para a reunião de status..."
                      rows="2"
                      value={demand.managerNotes || ''}
                      onChange={e => handleUpdateManagementField('managerNotes', e.target.value)}
                      className="w-full bg-yellow-500/5 border border-yellow-500/20 hover:border-yellow-500/30 rounded-xl p-3 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-yellow-500/50 transition-colors resize-none"
                    />
                  </div>
                </div>

                <hr className="border-slate-800" />

                 {/* Atribuição Manual de Dependências */}
                 <div className="space-y-4">
                   <h3 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                     <Icon name="plus" className="w-4 h-4 text-indigo-400" /> Atribuição Manual de Dependências
                   </h3>
                   
                   {/* Item Pai Manual */}
                   <div className="space-y-1.5 relative">
                     <label className="text-xs text-slate-400 font-medium">Demanda Pai (Hierarquia)</label>
                     
                     {isParentSearchOpen && (
                       <div className="fixed inset-0 z-10" onClick={() => setIsParentSearchOpen(false)} />
                     )}
                     
                     <div className="relative">
                       <button
                         type="button"
                         onClick={() => setIsParentSearchOpen(!isParentSearchOpen)}
                         className="w-full bg-slate-950 border border-slate-800/80 rounded-xl px-3 py-2 text-xs text-left text-slate-300 flex items-center justify-between hover:border-slate-700 transition-colors"
                       >
                         <span className="truncate">
                           {demand.parentId ? (
                             <>
                               <strong className="text-indigo-400">[{demand.parentId}]</strong>{' '}
                               {allDemands.find(d => d.externalId === demand.parentId)?.title || ''}
                               {demand.localParentId && demand.localParentId !== 'NONE' ? (
                                 <span className="ml-2 text-[9px] bg-indigo-500/10 text-indigo-400 px-1.5 py-0.5 rounded border border-indigo-500/20">Manual</span>
                               ) : demand.localParentId === 'NONE' ? (
                                 <span className="ml-2 text-[9px] bg-rose-500/10 text-rose-400 px-1.5 py-0.5 rounded border border-rose-500/20">Removido</span>
                               ) : (
                                 <span className="ml-2 text-[9px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded border border-slate-700">Auto</span>
                               )}
                             </>
                           ) : (
                             <span className="text-slate-500">Nenhum (Sem pai)</span>
                           )}
                         </span>
                         <Icon name="chevron-down" className="w-3.5 h-3.5 text-slate-500 flex-shrink-0" />
                       </button>

                       {isParentSearchOpen && (
                         <div className="absolute left-0 right-0 mt-1.5 bg-slate-950 border border-slate-800 rounded-xl shadow-2xl z-20 p-2 space-y-2 max-h-60 flex flex-col">
                           <div className="flex items-center gap-2 border-b border-slate-800 pb-1.5">
                             <Icon name="search" className="w-3.5 h-3.5 text-slate-500 ml-1.5" />
                             <input
                               type="text"
                               placeholder="Filtrar por ID ou Título..."
                               value={parentSearchQuery}
                               onChange={e => setParentSearchQuery(e.target.value)}
                               className="w-full bg-transparent text-xs text-slate-300 focus:outline-none placeholder-slate-600"
                               autoFocus
                             />
                             {parentSearchQuery && (
                               <button type="button" onClick={() => setParentSearchQuery('')}>
                                 <Icon name="x" className="w-3 h-3 text-slate-500 hover:text-slate-300" />
                               </button>
                             )}
                           </div>
                           <div className="overflow-y-auto flex-1 space-y-0.5 pr-1 max-h-40">
                             {/* Option to restore auto if manual override is active */}
                             {demand.localParentId && (
                               <button
                                 type="button"
                                 onClick={() => handleSelectParent(null)}
                                 className="w-full text-left text-xs px-2 py-1.5 rounded-lg hover:bg-slate-900 text-slate-400 flex items-center justify-between"
                               >
                                 <span>Restaurar vínculo automático</span>
                                 <Icon name="refresh-cw" className="w-3 h-3 text-slate-500" />
                               </button>
                             )}
                             
                             {/* Option for Nenhum */}
                             <button
                               type="button"
                               onClick={() => handleSelectParent('NONE')}
                               className="w-full text-left text-xs px-2 py-1.5 rounded-lg hover:bg-slate-900 text-slate-300 flex items-center justify-between"
                             >
                               <span>Sem pai (Nenhum)</span>
                               {demand.localParentId === 'NONE' && <Icon name="check" className="w-3.5 h-3.5 text-brand-500" />}
                             </button>

                             {/* List of filtered demands */}
                             {allDemands
                               .filter(d => d.externalId !== demandId)
                               .filter(d => 
                                 !parentSearchQuery ||
                                 d.externalId.toLowerCase().includes(parentSearchQuery.toLowerCase()) ||
                                 d.title.toLowerCase().includes(parentSearchQuery.toLowerCase())
                               )
                               .map(d => (
                                 <button
                                   key={d.externalId}
                                   type="button"
                                   onClick={() => handleSelectParent(d.externalId)}
                                   className="w-full text-left text-xs px-2 py-1.5 rounded-lg hover:bg-slate-900 text-slate-300 flex items-center justify-between gap-2"
                                 >
                                   <span className="truncate">
                                     <strong className="text-slate-400">[{d.externalId}]</strong> {d.title}
                                   </span>
                                   {demand.localParentId === d.externalId && <Icon name="check" className="w-3.5 h-3.5 text-brand-500" />}
                                 </button>
                               ))}
                           </div>
                         </div>
                       )}
                     </div>
                   </div>

                   {/* Bloqueadores Manuais */}
                   <div className="space-y-2.5 pt-2 border-t border-slate-800/40 relative">
                     <label className="text-xs text-slate-400 font-medium block">Bloqueadores (Blockers)</label>
                     
                     {/* Lista de Bloqueadores */}
                     {demand.blockers && demand.blockers.length > 0 ? (
                       <div className="flex flex-wrap gap-1.5 mb-2">
                         {demand.blockers.map(blockerId => (
                           <span
                             key={blockerId}
                             className="inline-flex items-center gap-1.5 text-xs font-semibold bg-rose-500/10 text-rose-400 border border-rose-500/20 pl-2.5 pr-1 py-1 rounded-lg"
                           >
                             {blockerId}
                             <button
                               type="button"
                               onClick={() => handleRemoveBlocker(blockerId)}
                               className="p-0.5 rounded text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 transition-colors"
                             >
                               <Icon name="x" className="w-3 h-3" />
                             </button>
                           </span>
                         ))}
                       </div>
                     ) : (
                       <span className="text-[10px] text-slate-500 block mb-1">Nenhum bloqueador manual associado.</span>
                     )}

                     {/* Form Adicionar Bloqueador como Dropdown */}
                     <div className="relative">
                       {isBlockerSearchOpen && (
                         <div className="fixed inset-0 z-10" onClick={() => setIsBlockerSearchOpen(false)} />
                       )}

    // Componente Modo One-on-One
    function ManagerSyncView({ demands, onSelectDemand }) {
      const getTodayStr = () => {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      const todayStr = getTodayStr();

      const targetDemands = demands.filter(d => {
        const matchesFollowUp = d.followUpDate && d.followUpDate <= todayStr;
        const matchesOverdue = d.promisedDate && d.promisedDate < todayStr && d.externalStatus !== 'Concluído' && d.externalStatus !== 'Done';
        return matchesFollowUp || matchesOverdue;
      });

      return (
        <div className="space-y-6 flex-1 overflow-y-auto px-8 py-6 max-w-7xl mx-auto w-full">
          <div>
            <h2 className="text-2xl font-bold text-white tracking-tight flex items-center gap-2">
              <Icon name="target" className="w-6 h-6 text-yellow-400 animate-pulse" />
              Modo One-on-One
            </h2>
            <p className="text-sm text-slate-400">Rastreamento de prazos acordados, cobranças pendentes e notas executivas</p>
          </div>

          {targetDemands.length > 0 ? (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {targetDemands.map(demand => {
                const isOverdue = demand.promisedDate && demand.promisedDate < todayStr && demand.externalStatus !== 'Concluído' && demand.externalStatus !== 'Done';
                const isFollowUpDue = demand.followUpDate && demand.followUpDate <= todayStr;
                
                return (
                  <div
                    key={demand.externalId}
                    onClick={() => onSelectDemand(demand.externalId)}
                    className="bg-slate-900/40 border border-slate-800/80 hover:border-slate-700 rounded-2xl p-5 space-y-4 hover:bg-slate-900/60 cursor-pointer transition-all group relative flex flex-col justify-between"
                  >
                    <div className="space-y-3">
                      <div className="flex items-center justify-between gap-3">
                        <div className="flex items-center gap-2">
                          <span className={`w-2.5 h-2.5 rounded-full ${
                            demand.origin === 'Jira' ? 'bg-sky-400' : 'bg-emerald-400'
                          }`} />
                          <span className="text-xs font-bold text-slate-400 uppercase">{demand.externalId}</span>
                        </div>
                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${
                          demand.externalStatus === 'Concluído' || demand.externalStatus === 'Done'
                            ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20'
                            : 'bg-indigo-500/10 text-indigo-400 border border-indigo-500/20'
                        }`}>
                          {demand.externalStatus}
                        </span>
                      </div>

                      <h3 className="font-bold text-base text-slate-100 group-hover:text-white transition-colors line-clamp-2">
                        {demand.title}
                      </h3>

                      {/* Badges de Atenção */}
                      <div className="flex flex-wrap gap-2 pt-1">
                        {isOverdue && (
                          <span className="inline-flex items-center gap-1.5 text-[10px] font-bold bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2.5 py-1 rounded-md">
                            <Icon name="alert-triangle" className="w-3.5 h-3.5" />
                            Prazo Estourado ({demand.promisedDate})
                          </span>
                        )}
                        {isFollowUpDue && (
                          <span className="inline-flex items-center gap-1.5 text-[10px] font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1 rounded-md">
                            <Icon name="bell" className="w-3.5 h-3.5" />

                          </span>

                      </div>

                      {/* Resumo Gestora */}
                      {demand.managerNotes ? (
                        <div className="bg-yellow-500/5 border border-yellow-500/20 rounded-xl p-3 mt-2">

                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="bg-slate-900/20 border border-slate-800/80 rounded-2xl p-12 text-center text-slate-500 max-w-lg mx-auto">
              <Icon name="target" className="w-12 h-12 mx-auto text-slate-700 mb-3" />

    // Componente Visão de Projetos
    function ProjectView({ demands, onSelectDemand }) {
      const [expandedProjects, setExpandedProjects] = useState({});

      const getProjectName = (tag) => {
        const cleanTag = tag.trim().toLowerCase();
        if (cleanTag.startsWith('projeto:')) {
          return cleanTag.substring(8).trim();
        }
        if (cleanTag.startsWith('projeto-')) {
          return cleanTag.substring(8).trim();
        }
        return null;
      };

      const capitalize = (str) => {
        if (!str) return '';
        return str.split(/[\s-_]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      };

      const projectsMap = {};
      demands.forEach(d => {
        if (d.tags && d.tags.length > 0) {
          d.tags.forEach(tag => {
            const projName = getProjectName(tag);
            if (projName) {
              const capitalizedProjName = capitalize(projName);
              if (!projectsMap[capitalizedProjName]) {
                projectsMap[capitalizedProjName] = [];
              }
              if (!projectsMap[capitalizedProjName].some(existing => existing.externalId === d.externalId)) {
                projectsMap[capitalizedProjName].push(d);
              }
            }
          });
        }
      });

      const toggleProject = (projectName) => {
        setExpandedProjects(prev => ({
          ...prev,
          [projectName]: !prev[projectName]
        }));
      };

      const projectNames = Object.keys(projectsMap).sort();

      return (
        <div className="space-y-6 flex-1 overflow-y-auto px-8 py-6 max-w-7xl mx-auto w-full">
          <div>
            <h2 className="text-2xl font-bold text-white tracking-tight flex items-center gap-2.5">
              <Icon name="layers" className="w-6 h-6 text-indigo-400" />
              Visão de Projetos
            </h2>
            <p className="text-sm text-slate-400">Agrupamento cruzado por iniciativa/projeto com mapeamento visual de dependências</p>
          </div>

          {projectNames.length > 0 ? (
            <div className="space-y-4">
              {projectNames.map(projName => {
                const projDemands = projectsMap[projName];
                const isExpanded = expandedProjects[projName] !== false;
                const azureDemands = projDemands.filter(d => d.origin === 'Azure');
                const jiraDemands = projDemands.filter(d => d.origin === 'Jira');

                return (
                  <div 
                    key={projName}
                    className="bg-slate-900/20 border border-slate-800/80 rounded-2xl overflow-hidden backdrop-blur-md transition-all duration-300"
                  >
                    <button
                      onClick={() => toggleProject(projName)}
                      className="w-full flex items-center justify-between px-6 py-4 hover:bg-slate-900/40 text-left transition-colors"
                    >
                      <div className="flex items-center gap-3">
                        <span className="w-3 h-3 rounded-full bg-gradient-to-tr from-brand-500 to-indigo-400" />
                        <div>
                          <h3 className="text-base font-bold text-slate-100">{projName}</h3>
                          <span className="text-xs text-slate-500 font-medium">
                            {projDemands.length} {projDemands.length === 1 ? 'demanda associada' : 'demandas associadas'}
                          </span>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full font-medium">
                          Azure: {azureDemands.length} | Jira: {jiraDemands.length}
                        </span>
                        {isExpanded ? (
                          <Icon name="chevron-up" className="w-4 h-4 text-slate-400" />
                        ) : (
                          <Icon name="chevron-down" className="w-4 h-4 text-slate-400" />
                        )}
                      </div>
                    </button>

                    {isExpanded && (
                      <div className="border-t border-slate-800/60 p-6 bg-slate-950/20">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                          {/* Coluna Azure DevOps */}
                          <div className="space-y-4">
                            <div className="flex items-center justify-between border-b border-slate-800/80 pb-2">
                              <h4 className="text-xs font-bold text-emerald-400 uppercase tracking-widest flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-emerald-500" />
                                Azure DevOps
                              </h4>
                              <span className="text-[10px] text-slate-500 font-bold">{azureDemands.length} itens</span>
                            </div>

                            <div className="space-y-3">
                              {azureDemands.length > 0 ? (
                                azureDemands.map(demand => (
                                  <DemandProjectCard
                                    key={demand.externalId}
                                    demand={demand}
                                    onSelect={onSelectDemand}
                                  />
                                ))
                              ) : (
                                <div className="text-center py-8 border border-dashed border-slate-800/60 rounded-xl text-slate-600 text-xs">
                                  Nenhuma demanda do Azure DevOps neste projeto.
                                </div>
                              )}
                            </div>
                          </div>
